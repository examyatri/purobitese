<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#e63946">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TiffoTube — Help & Tutorials</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ── Design tokens ─────────────────────────────────── */
:root {
  --p:#e63946; --pd:#c1121f; --pl:#fde8ea;
  --grad:linear-gradient(135deg,#e63946,#f4591d);
  --dk:#0f172a; --mid:#374151; --gr:#6b7280; --lt:#f1f3f5; --wh:#fff;
  --border:#eaecf0;
  --ff:'Sora',-apple-system,BlinkMacSystemFont,sans-serif;
  --fb:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --sh:0 1px 4px rgba(0,0,0,.07),0 6px 20px rgba(0,0,0,.07);
  --sh-hover:0 4px 24px rgba(0,0,0,.14);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --header-h:56px;
  --chips-h:48px;
  --footer-h:64px;
}

/* ── Reset ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:#fff;overflow:hidden}
body{height:100dvh;display:flex;flex-direction:column;background:#fff;color:var(--dk);font-family:var(--fb);overflow:hidden}

/* ── Header ────────────────────────────────────────── */
#tt-header {
  height:calc(var(--header-h) + var(--safe-t));
  padding-top:var(--safe-t);
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding-left:8px;
  padding-right:12px;
  flex-shrink:0;
  position:relative;
  z-index:200;
  box-shadow:0 1px 0 var(--border),0 2px 12px rgba(0,0,0,.04);
}
.tt-back {
  width:40px;height:40px;border:none;background:none;
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--mid);font-size:17px;
  transition:background .15s;
  flex-shrink:0;
}
.tt-back:hover,.tt-back:active{background:#f3f4f6}

.tt-logo {
  display:flex;align-items:center;gap:7px;
  cursor:pointer;text-decoration:none;
  flex:1;justify-content:center;
}
.tt-logo-badge {
  width:30px;height:30px;
  background:var(--grad);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;
  box-shadow:0 3px 8px rgba(230,57,70,.35);
  flex-shrink:0;
}
.tt-logo-text {
  font-family:var(--ff);font-weight:800;font-size:17px;
  color:var(--dk);letter-spacing:-.4px;
  line-height:1;
}
.tt-logo-text em{color:var(--p);font-style:normal}

#tt-search-btn {
  width:40px;height:40px;border:none;
  background:#f3f4f6;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--mid);font-size:15px;
  transition:background .15s;
  flex-shrink:0;
}
#tt-search-btn:hover{background:#e5e7eb}

/* ── Search bar ────────────────────────────────────── */
#tt-search-bar {
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 14px 10px;
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height .25s cubic-bezier(.4,0,.2,1),opacity .2s,padding .25s;
  flex-shrink:0;
}
#tt-search-bar.open {
  max-height:60px;
  opacity:1;
  padding:8px 14px 10px;
}
.tt-search-inner {
  position:relative;
  display:flex;
  align-items:center;
}
.tt-search-icon {
  position:absolute;left:13px;
  color:var(--gr);font-size:13px;pointer-events:none;
  z-index:1;
}
#tt-search-input {
  width:100%;
  padding:9px 36px 9px 36px;
  border:1.5px solid #e5e7eb;
  border-radius:24px;
  font-family:var(--fb);font-size:14px;color:var(--dk);
  background:#f8fafc;outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
#tt-search-input:focus {
  border-color:var(--p);
  box-shadow:0 0 0 3px rgba(230,57,70,.1);
  background:#fff;
}
.tt-search-clear {
  position:absolute;right:11px;
  width:22px;height:22px;border:none;background:#e5e7eb;
  border-radius:50%;cursor:pointer;font-size:10px;color:var(--gr);
  display:none;align-items:center;justify-content:center;
  transition:background .15s;
}
.tt-search-clear.show{display:flex}
.tt-search-clear:hover{background:#d1d5db}

/* ── Category chips ────────────────────────────────── */
#tt-chips {
  display:flex;gap:8px;
  padding:0 14px;
  height:var(--chips-h);
  align-items:center;
  overflow-x:auto;
  scrollbar-width:none;
  background:#fff;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#tt-chips::-webkit-scrollbar{display:none}
.chip {
  flex-shrink:0;
  padding:5px 14px;
  border-radius:20px;
  border:1.5px solid #e5e7eb;
  font-family:var(--ff);font-size:12px;font-weight:600;
  color:var(--gr);background:#fff;cursor:pointer;
  transition:all .18s;white-space:nowrap;
  user-select:none;
}
.chip.active {
  background:var(--p);color:#fff;border-color:var(--p);
  box-shadow:0 2px 8px rgba(230,57,70,.3);
}
.chip:not(.active):hover{border-color:#c4c9d4;color:var(--mid)}

/* ── Scroll area ───────────────────────────────────── */
#tt-scroll {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding-bottom:calc(var(--footer-h) + var(--safe-b) + 24px);
}

/* ── Section header ────────────────────────────────── */
.tt-section-hd {
  padding:16px 14px 10px;
  font-family:var(--ff);font-weight:700;font-size:12px;
  color:var(--gr);letter-spacing:.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.tt-section-hd::after {
  content:'';flex:1;height:1px;background:var(--border);
}

/* ── Video grid — single column YouTube-style ──────── */
.tt-grid {
  display:flex;
  flex-direction:column;
  gap:0;
  padding:0 0 8px;
}

/* ── Video card — YouTube mobile style ─────────────── */
.vcard {
  background:#fff;
  cursor:pointer;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
  will-change:transform;
  display:flex;
  flex-direction:row;
  align-items:flex-start;
  gap:10px;
  padding:12px 12px;
  border-bottom:1px solid var(--border);
}
.vcard:active{background:#f3f4f6}

/* Thumbnail — fixed 120x68 (16:9) on the left */
.vcard-thumb {
  position:relative;
  width:120px;
  height:68px;
  flex-shrink:0;
  border-radius:8px;
  background:#111;
  overflow:hidden;
}
.vcard-thumb img {
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transition:transform .3s;
}
.vcard:active .vcard-thumb img{transform:scale(1.03)}
.vcard-thumb-placeholder {
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
}
.vcard-thumb-overlay {
  position:absolute;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(to top,rgba(0,0,0,.45),transparent);
  pointer-events:none;
}
.vcard-play {
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.18);
  opacity:0;transition:opacity .2s;
}
.vcard:hover .vcard-play{opacity:1}
.vcard-play-circle {
  width:32px;height:32px;
  background:rgba(230,57,70,.9);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;padding-left:2px;
  box-shadow:0 2px 10px rgba(0,0,0,.35);
}
.vcard-cat-dot {
  position:absolute;top:5px;left:5px;
  padding:2px 6px;border-radius:20px;
  font-size:8px;font-family:var(--ff);font-weight:700;
  backdrop-filter:blur(8px);
  letter-spacing:.2px;
}
.vcard-badge {
  position:absolute;bottom:5px;right:5px;
  background:rgba(0,0,0,.72);
  color:#fff;font-size:8px;font-family:var(--ff);font-weight:600;
  padding:2px 5px;border-radius:3px;
  display:flex;align-items:center;gap:3px;
}

/* Card body — right side text */
.vcard-body{flex:1;min-width:0;padding:0}
.vcard-title {
  font-family:var(--ff);font-weight:700;font-size:13px;
  color:var(--dk);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:5px;
}
.vcard-meta {
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--gr);font-family:var(--fb);
}
.vcard-meta-dot{width:3px;height:3px;border-radius:50%;background:#d1d5db}

/* ── Featured / wide card — full width vertical ────── */
.vcard-wide {
  flex-direction:column;
  padding:0 0 12px;
  border-bottom:1px solid var(--border);
  gap:0;
}
.vcard-wide .vcard-thumb {
  width:100%;height:auto;
  border-radius:0;
  position:relative;
  padding-top:56.25%;
}
.vcard-wide .vcard-thumb img {
  position:absolute;inset:0;width:100%;height:100%;
}
.vcard-wide .vcard-thumb-placeholder{position:absolute;inset:0}
.vcard-wide .vcard-play-circle{width:54px;height:54px;font-size:18px}
.vcard-wide .vcard-body{padding:10px 12px 0}
.vcard-wide .vcard-title{font-size:15px;-webkit-line-clamp:2}

/* ── Empty state ───────────────────────────────────── */
#tt-empty {
  display:none;
  text-align:center;
  padding:52px 28px;
}
#tt-empty i{font-size:42px;color:#d1d5db;margin-bottom:14px;display:block}
#tt-empty h3{font-family:var(--ff);font-size:15px;font-weight:700;color:var(--mid);margin-bottom:6px}
#tt-empty p{font-size:13px;color:var(--gr);font-family:var(--fb);line-height:1.6}

/* ── Skeleton ──────────────────────────────────────── */
#tt-skeleton{display:flex;flex-direction:column;gap:0;padding:0}
.sk-card{background:#fff;display:flex;flex-direction:row;align-items:flex-start;gap:10px;padding:12px 12px;border-bottom:1px solid var(--border)}
.sk-thumb{width:120px;height:68px;flex-shrink:0;border-radius:8px;background:#f1f5f9;position:relative;overflow:hidden}
.sk-body{flex:1;padding:4px 0}
.sk-line{height:10px;background:#f1f5f9;border-radius:6px;margin-bottom:7px;overflow:hidden;position:relative}
.sk-line.short{width:55%}
.sk-shimmer{animation:shimmer 1.5s infinite}
.sk-shimmer::after,.sk-thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.65) 50%,transparent 100%);
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ═══════════════════════════════════════════════════
   YOUTUBE-STYLE PLAYER OVERLAY
   ═══════════════════════════════════════════════════ */
#player-overlay {
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  z-index:500;
  display:none;
  align-items:flex-end;
  justify-content:center;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
#player-overlay.open{display:flex}

#player-sheet {
  width:100%;max-width:600px;
  background:#0f0f0f; /* YouTube dark bg */
  border-radius:20px 20px 0 0;
  overflow:hidden;
  max-height:94dvh;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .36s cubic-bezier(.32,0,.67,0);
  box-shadow:0 -12px 50px rgba(0,0,0,.4);
}
#player-overlay.open #player-sheet{
  transform:translateY(0);
  transition:transform .36s cubic-bezier(.33,1,.68,1);
}

/* YT-style drag handle */
.player-drag-handle {
  display:flex;justify-content:center;align-items:center;
  padding:10px 0 6px;
  flex-shrink:0;
  background:#0f0f0f;
}
.player-drag-handle::before {
  content:'';display:block;
  width:40px;height:4px;background:#3f3f3f;border-radius:2px;
}

/* 16:9 video area */
#player-iframe-wrap {
  position:relative;
  width:100%;
  padding-top:56.25%;
  background:#000;
  flex-shrink:0;
}
#player-iframe{
  position:absolute;inset:0;width:100%;height:100%;border:none;
  display:block;
}

/* Close button on video */
#player-close {
  position:absolute;top:10px;right:10px;
  width:34px;height:34px;border:none;
  background:rgba(0,0,0,.6);
  border-radius:50%;color:#fff;font-size:14px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;backdrop-filter:blur(6px);
}
#player-close:hover{background:rgba(0,0,0,.85)}

/* Info section — white card below video */
#player-info {
  background:#fff;
  padding:14px 16px 16px;
  overflow-y:auto;flex:1;min-height:0;
}

/* Title row */
#player-title-row {
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  margin-bottom:10px;
}
#player-title {
  font-family:var(--ff);font-weight:800;font-size:15px;
  color:var(--dk);line-height:1.45;flex:1;
}
#player-yt-link {
  flex-shrink:0;
  width:34px;height:34px;border-radius:50%;
  background:#ff0000;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;text-decoration:none;
  box-shadow:0 2px 8px rgba(255,0,0,.35);
  transition:transform .15s,box-shadow .15s;
}
#player-yt-link:hover{transform:scale(1.1);box-shadow:0 4px 14px rgba(255,0,0,.4)}

/* Meta row */
#player-meta-row {
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.player-cat-pill {
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:20px;
  font-size:11px;font-family:var(--ff);font-weight:700;
}

/* Divider */
.player-divider{height:1px;background:var(--border);margin:4px 0 14px}

/* Up Next section */
#player-related-hd {
  font-family:var(--ff);font-weight:700;font-size:12px;
  color:var(--mid);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
  text-transform:uppercase;letter-spacing:.5px;
}
.player-related-list{display:flex;flex-direction:column;gap:6px}
.pr-item {
  display:flex;gap:9px;align-items:flex-start;cursor:pointer;
  padding:7px 8px;border-radius:10px;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.pr-item:hover,.pr-item:active{background:#f8f7f5}
.pr-thumb {
  width:72px;height:45px; /* exact 16:9 */
  border-radius:7px;overflow:hidden;
  background:#111;flex-shrink:0;position:relative;
}
.pr-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.pr-thumb-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
}
.pr-play-icon{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);opacity:0;transition:opacity .15s;
}
.pr-item:hover .pr-play-icon{opacity:1}
.pr-title{
  font-family:var(--ff);font-size:12px;font-weight:700;color:var(--dk);
  line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.pr-meta{font-size:10.5px;color:var(--gr);font-family:var(--fb);margin-top:3px}

/* ── Footer ────────────────────────────────────────── */
#tt-footer {
  height:var(--footer-h);
  flex-shrink:0;background:#fff;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  padding-bottom:var(--safe-b);
  gap:10px;
  box-shadow:0 -2px 16px rgba(0,0,0,.05);
}
.tt-fbtn {
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 10px;border-radius:12px;border:none;
  font-family:var(--ff);font-size:13px;font-weight:700;
  cursor:pointer;transition:all .18s;text-decoration:none;
  user-select:none;
}
.tt-fbtn:active{transform:scale(.96)}
.tt-fbtn-offer{background:linear-gradient(135deg,#f59e0b,#f4591d);color:#fff;box-shadow:0 3px 10px rgba(245,158,11,.3)}
.tt-fbtn-wa{background:#25d366;color:#fff;box-shadow:0 3px 10px rgba(37,211,102,.3)}
.tt-fbtn-offer:hover{box-shadow:0 4px 14px rgba(245,158,11,.4)}
.tt-fbtn-wa:hover{box-shadow:0 4px 14px rgba(37,211,102,.4)}

/* ── Toast ─────────────────────────────────────────── */
#tt-toast {
  position:fixed;bottom:calc(var(--footer-h) + 14px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:#0f172a;color:#fff;border-radius:24px;
  padding:9px 20px;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;pointer-events:none;
  font-family:var(--fb);font-size:13px;font-weight:500;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);
}
#tt-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Category colour map ───────────────────────────── */
[data-cat=order]        .vcard-cat-dot{background:rgba(3,105,161,.8);color:#fff}
[data-cat=recharge]     .vcard-cat-dot{background:rgba(5,150,105,.8);color:#fff}
[data-cat=payment]      .vcard-cat-dot{background:rgba(217,119,6,.85);color:#fff}
[data-cat=subscription] .vcard-cat-dot{background:rgba(124,58,237,.8);color:#fff}
[data-cat=general]      .vcard-cat-dot{background:rgba(100,116,139,.75);color:#fff}
</style>
</head>
<body>

<!-- ── Header ── -->
<header id="tt-header">
  <button class="tt-back" onclick="window.location.href='./'" aria-label="Back to Tiffo">
    <i class="fa fa-arrow-left"></i>
  </button>
  <a class="tt-logo" onclick="resetFilters()" href="javascript:void(0)" aria-label="TiffoTube home">
    <div class="tt-logo-badge"><i class="fa-brands fa-youtube"></i></div>
    <div class="tt-logo-text">Tiffo<em>Tube</em></div>
  </a>
  <button id="tt-search-btn" onclick="toggleSearch()" aria-label="Search videos">
    <i class="fa fa-magnifying-glass"></i>
  </button>
</header>

<!-- ── Search bar ── -->
<div id="tt-search-bar" role="search">
  <div class="tt-search-inner">
    <i class="fa fa-magnifying-glass tt-search-icon"></i>
    <input id="tt-search-input" type="search" inputmode="search"
      placeholder="Search help videos…" autocomplete="off" autocorrect="off"
      oninput="onSearchInput(this.value)">
    <button class="tt-search-clear" id="tt-search-clear" onclick="clearSearch()" aria-label="Clear search">
      <i class="fa fa-xmark"></i>
    </button>
  </div>
</div>

<!-- ── Category chips ── -->
<div id="tt-chips" role="tablist" aria-label="Filter by category">
  <div class="chip active" role="tab" aria-selected="true" onclick="setChip('all',this)">All</div>
</div>

<!-- ── Main scroll area ── -->
<main id="tt-scroll">

  <!-- Skeleton -->
  <div id="tt-skeleton">
    <div class="sk-card"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
    <div class="sk-card"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
    <div class="sk-card"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
    <div class="sk-card"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
  </div>

  <div id="tt-content"></div>

  <div id="tt-empty">
    <i class="fa fa-film"></i>
    <h3 id="tt-empty-title">No videos found</h3>
    <p id="tt-empty-sub">Try searching with different keywords,<br>or browse a different category.</p>
  </div>

</main>

<!-- ── Footer ── -->
<footer id="tt-footer">
  <button class="tt-fbtn tt-fbtn-offer" onclick="window.location.href='offer.html'">
    <i class="fa fa-tag"></i> Offers
  </button>
  <button class="tt-fbtn tt-fbtn-wa" onclick="openWA()">
    <i class="fa-brands fa-whatsapp"></i> WhatsApp Help
  </button>
</footer>

<!-- ── YouTube-style Player Sheet ── -->
<div id="player-overlay" role="dialog" aria-modal="true" aria-label="Video player"
  onclick="onOverlayClick(event)">
  <div id="player-sheet">
    <!-- Drag handle -->
    <div class="player-drag-handle"></div>

    <!-- Video iframe (16:9) -->
    <div id="player-iframe-wrap">
      <iframe id="player-iframe" src="" title="Help video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
      <button id="player-close" onclick="closePlayer()" aria-label="Close video">
        <i class="fa fa-xmark"></i>
      </button>
    </div>

    <!-- Info panel -->
    <div id="player-info">
      <div id="player-title-row">
        <div id="player-title"></div>
        <a id="player-yt-link" href="#" target="_blank" rel="noopener" title="Watch on YouTube" aria-label="Watch on YouTube">
          <i class="fa-brands fa-youtube"></i>
        </a>
      </div>
      <div id="player-meta-row">
        <div id="player-cat-pill" class="player-cat-pill"></div>
      </div>
      <div class="player-divider"></div>
      <div id="player-related-hd" style="display:none">Up Next</div>
      <div id="player-related" class="player-related-list"></div>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="tt-toast" role="status" aria-live="polite"></div>

<script src="https://purobitese-api.onrender.com/config.js" async></script>
<script>
/* ═══════════════════════════════════════════════════
   TiffoTube — help.html  (v3.2)
   ═══════════════════════════════════════════════════ */

const API_BASE = 'https://purobitese-api.onrender.com';

let _videos      = [];
let _activeChip  = 'all';
let _searchQ     = '';
let _searchTimer = null;
let _loadError   = false;

let CAT = {
  all:     { label:'All',     color:'#e63946', bg:'#fde8ea' },
  general: { label:'General', color:'#475569', bg:'#f1f5f9' },
};

/* ── Single cache key — cats + videos always stored together ──
   They must be in sync (video.category must exist in CAT map),
   so splitting them into separate keys/TTLs is a consistency risk.
   One key, one TTL, one fetch. Simple. ── */
const _CACHE_KEY = 'tt_helpdata_v1';
const _TTL       = 60 * 60 * 1000; // 1 hour — well beyond any realistic session

function _cacheGet() {
  try {
    const raw = localStorage.getItem(_CACHE_KEY);
    if (!raw) return null;
    const { ts, cats, videos } = JSON.parse(raw);
    if (Date.now() - ts > _TTL) return null; // expired — treat as cold
    return { cats, videos };
  } catch { return null; }
}
function _cacheSet(cats, videos) {
  try { localStorage.setItem(_CACHE_KEY, JSON.stringify({ ts: Date.now(), cats, videos })); } catch {}
}

/* ── API key — singleton promise so concurrent callers never double-fetch ── */
function _getKey() {
  return window.__TIFFO_API_KEY__ || localStorage.getItem('tf_api_key') || '';
}
let _ensureKeyPromise = null;
function _ensureKey() {
  if (_getKey()) return Promise.resolve();
  if (_ensureKeyPromise) return _ensureKeyPromise;
  _ensureKeyPromise = fetch(API_BASE + '/config.js')
    .then(r => r.text())
    .then(t => {
      const m = t.match(/window\.__TIFFO_API_KEY__\s*=\s*"([^"]*)"/);
      if (m) { window.__TIFFO_API_KEY__ = m[1]; localStorage.setItem('tf_api_key', m[1]); }
    })
    .catch(() => {})
    .finally(() => { _ensureKeyPromise = null; });
  return _ensureKeyPromise;
}

/* ── Apply categories to CAT map + chips DOM ── */
function _applyCategories(cats) {
  CAT = { all: { label:'All', color:'#e63946', bg:'#fde8ea' } };
  cats.forEach(c => { CAT[c.slug] = { label: c.label, color: c.color, bg: c.bg_color }; });
  const chipsEl = document.getElementById('tt-chips');
  if (!chipsEl) return;
  const allChip = chipsEl.querySelector('.chip');
  chipsEl.innerHTML = '';
  if (allChip) chipsEl.appendChild(allChip);
  cats.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.role = 'tab';
    chip.setAttribute('aria-selected', 'false');
    chip.textContent = c.label;
    chip.onclick = function() { setChip(c.slug, this); };
    chipsEl.appendChild(chip);
  });
}

/* ── Load videos ──
   Cache hit  (within 1 h): render instantly from localStorage. 0 DB hits.
   Cache miss (first visit / expired): 1 HTTP request → 2 parallel Supabase
   queries on server → single response with cats + videos together.
── */
async function loadVideos() {
  _loadError = false;

  const cached = _cacheGet();
  if (cached) {
    // ── HIT: render from cache, no network at all ──
    _applyCategories(cached.cats);
    _videos = cached.videos;
    document.getElementById('tt-skeleton').style.display = 'none';
    render();
    return;
  }

  // ── MISS: single fetch, both datasets in one response ──
  try {
    await _ensureKey();
    const res  = await fetch(API_BASE + '/api', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'getHelpData', data: {}, apiKey: _getKey() })
    });
    const data = await res.json();
    const cats   = data.categories || [];
    const videos = (data.videos || []).sort((a, b) => (a.order_index || 0) - (b.order_index || 0));
    _cacheSet(cats, videos);
    _applyCategories(cats);
    _videos = videos;
  } catch(e) {
    _videos    = [];
    _loadError = true;
  }
  document.getElementById('tt-skeleton').style.display = 'none';
  render();
}

/* ── YouTube helpers ── */
function ytId(url) {
  if (!url) return '';
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : '';
}
function ytThumb(url) {
  const id = ytId(url);
  /* hqdefault = 480×360, sddefault = 640×480, maxresdefault = best */
  return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : '';
}
function ytEmbed(url) {
  const id = ytId(url);
  return id ? `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1` : '';
}

/* ── Escape HTML ── */
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Filter ── */
function filteredVideos() {
  let list = _videos;
  if (_activeChip !== 'all') list = list.filter(v => v.category === _activeChip);
  if (_searchQ) {
    const q = _searchQ.toLowerCase();
    list = list.filter(v =>
      (v.title||'').toLowerCase().includes(q) ||
      (v.description||'').toLowerCase().includes(q)
    );
  }
  return list;
}

/* ── Build card ── */
function buildCard(v, wide) {
  const thumb    = ytThumb(v.youtube_url);
  const catCfg   = CAT[v.category] || CAT.general;
  const wideClass = wide ? ' vcard-wide' : '';

  const thumbContent = thumb
    ? `<img src="${esc(thumb)}" alt="${esc(v.title)}" loading="lazy"
         onerror="this.closest('.vcard-thumb').innerHTML='<div class=vcard-thumb-placeholder><i class=\\'fa fa-play-circle\\' style=\\'font-size:32px;color:#c4b5fd\\'></i></div>'">`
    : `<div class="vcard-thumb-placeholder">
         <i class="fa fa-play-circle" style="font-size:32px;color:#c4b5fd"></i>
       </div>`;

  return `
    <div class="vcard${wideClass}" data-cat="${esc(v.category)}" onclick="openPlayer(${v.id})" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter')openPlayer(${v.id})">
      <div class="vcard-thumb">
        ${thumbContent}
        <div class="vcard-thumb-overlay"></div>
        <div class="vcard-play"><div class="vcard-play-circle"><i class="fa fa-play" style="margin-left:2px"></i></div></div>
        <div class="vcard-cat-dot">${esc(catCfg.label)}</div>
        <div class="vcard-badge"><i class="fa fa-play" style="font-size:7px"></i> Watch</div>
      </div>
      <div class="vcard-body">
        <div class="vcard-title">${esc(v.title)}</div>
        <div class="vcard-meta">
          <span>${esc(catCfg.label)}</span>
          <span class="vcard-meta-dot"></span>
          <span>Tap to watch</span>
        </div>
      </div>
    </div>`;
}

/* ── Render ── */
function render() {
  const list    = filteredVideos();
  const content = document.getElementById('tt-content');
  const empty   = document.getElementById('tt-empty');

  if (!list.length) {
    content.innerHTML = '';
    empty.style.display = 'block';
    const isError = _loadError && !_searchQ && _activeChip === 'all';
    document.getElementById('tt-empty-title').textContent = isError ? 'Could not load videos' : 'No videos found';
    document.getElementById('tt-empty-sub').textContent   = isError
      ? 'Check your connection and try again.'
      : _searchQ
        ? `No results for "${_searchQ}" — try different keywords`
        : 'No videos in this category yet. Check back soon!';
    return;
  }
  empty.style.display = 'none';

  if (_activeChip === 'all' && !_searchQ) {
    const cats = Object.keys(CAT).filter(k => k !== 'all');
    let html = '';
    const first = list[0];
    if (first) {
      html += `<div class="tt-section-hd" style="padding:16px 14px 10px">Featured</div>${buildCard(first, true)}`;
    }
    cats.forEach(cat => {
      const group = list.filter(v => v.category === cat && v.id !== first?.id);
      if (!group.length) return;
      const catCfg = CAT[cat];
      html += `<div class="tt-section-hd">${esc(catCfg.label)}</div>`;
      html += `<div class="tt-grid">`;
      group.forEach(v => { html += buildCard(v, false); });
      html += `</div>`;
      // (tt-grid is now a flex column — no wrapper padding needed)
    });
    content.innerHTML = html;
  } else {
    const hd = _searchQ
      ? `<div class="tt-section-hd">${list.length} result${list.length!==1?'s':''} for "${esc(_searchQ)}"</div>`
      : `<div class="tt-section-hd">${esc((CAT[_activeChip]||CAT.all).label)} · ${list.length} video${list.length!==1?'s':''}</div>`;
    content.innerHTML = hd + `<div class="tt-grid">${list.map(v=>buildCard(v,false)).join('')}</div>`;
  }
}

/* ── Open player (YouTube-style) ── */
function openPlayer(id) {
  const v = _videos.find(x => x.id === id);
  if (!v) return;
  const embedUrl = ytEmbed(v.youtube_url);
  if (!embedUrl) { showToast('Invalid video link'); return; }

  const catCfg = CAT[v.category] || CAT.general;
  const vid    = ytId(v.youtube_url);

  /* Set iframe */
  document.getElementById('player-iframe').src = embedUrl;

  /* Title + YT link */
  document.getElementById('player-title').textContent = v.title;
  const ytLink = document.getElementById('player-yt-link');
  if (ytLink) ytLink.href = `https://www.youtube.com/watch?v=${vid}`;

  /* Category pill */
  const pill = document.getElementById('player-cat-pill');
  pill.textContent = catCfg.label;
  pill.style.background = catCfg.bg;
  pill.style.color       = catCfg.color;

  /* Related videos */
  const related = _videos.filter(x => x.id !== id && (x.category === v.category || !v.category)).slice(0, 4);
  const relHd   = document.getElementById('player-related-hd');
  const relList = document.getElementById('player-related');
  if (related.length) {
    relHd.style.display = 'flex';
    relList.innerHTML = related.map(r => {
      const t  = ytThumb(r.youtube_url);
      const rc = CAT[r.category] || CAT.general;
      return `
        <div class="pr-item" onclick="openPlayer(${r.id})" role="button" tabindex="0">
          <div class="pr-thumb">
            ${t ? `<img src="${esc(t)}" alt="" loading="lazy">` : `<div class="pr-thumb-placeholder"><i class="fa-brands fa-youtube" style="color:#c4b5fd;font-size:16px"></i></div>`}
            <div class="pr-play-icon"><i class="fa fa-play" style="color:#fff;font-size:10px;margin-left:1px"></i></div>
          </div>
          <div style="flex:1;min-width:0">
            <div class="pr-title">${esc(r.title)}</div>
            <div class="pr-meta" style="color:${esc(rc.color)}">${esc(rc.label)}</div>
          </div>
        </div>`;
    }).join('');
  } else {
    relHd.style.display = 'none';
    relList.innerHTML = '';
  }

  /* Open */
  const overlay = document.getElementById('player-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('open'));
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  const overlay = document.getElementById('player-overlay');
  overlay.classList.remove('open');
  setTimeout(() => {
    overlay.style.display = 'none';
    document.getElementById('player-iframe').src = '';
    document.body.style.overflow = '';
  }, 380);
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('player-overlay')) closePlayer();
}

/* ── Search ── */
function onSearchInput(val) {
  clearTimeout(_searchTimer);
  const clearBtn = document.getElementById('tt-search-clear');
  if (clearBtn) clearBtn.classList.toggle('show', val.length > 0);
  _searchTimer = setTimeout(() => {
    _searchQ = val.trim();
    render();
  }, 220);
}

function toggleSearch() {
  const bar = document.getElementById('tt-search-bar');
  const btn = document.getElementById('tt-search-btn');
  const isOpen = bar.classList.toggle('open');
  btn.innerHTML = isOpen
    ? '<i class="fa fa-xmark"></i>'
    : '<i class="fa fa-magnifying-glass"></i>';
  if (isOpen) {
    setTimeout(() => document.getElementById('tt-search-input').focus(), 120);
  } else {
    clearSearch();
  }
}

function clearSearch() {
  const inp = document.getElementById('tt-search-input');
  const clearBtn = document.getElementById('tt-search-clear');
  if (inp) inp.value = '';
  if (clearBtn) clearBtn.classList.remove('show');
  _searchQ = '';
  render();
}

/* ── Chips ── */
function setChip(cat, el) {
  _activeChip = cat;
  document.querySelectorAll('#tt-chips .chip').forEach(c => {
    c.classList.remove('active');
    c.setAttribute('aria-selected','false');
  });
  el.classList.add('active');
  el.setAttribute('aria-selected','true');
  render();
  el.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

function resetFilters() {
  _activeChip = 'all';
  _searchQ    = '';
  document.querySelectorAll('#tt-chips .chip').forEach((c,i) => {
    c.classList.toggle('active', i===0);
    c.setAttribute('aria-selected', i===0 ? 'true':'false');
  });
  const inp = document.getElementById('tt-search-input');
  if (inp) inp.value = '';
  const bar = document.getElementById('tt-search-bar');
  if (bar.classList.contains('open')) toggleSearch();
  render();
}

/* ── WhatsApp ── */
function openWA() {
  const msg = encodeURIComponent(
    '\uD83C\uDD98 *Tiffo \u2014 Help Request*\n' +
    '\u2501'.repeat(28) + '\n' +
    'Hi Tiffo Team! \uD83D\uDC4B\n\n' +
    'I need help. Please assist me.\n\n' +
    'Thank you! \uD83D\uDE4F'
  );
  window.open('https://wa.me/919889760350?text=' + msg, '_blank');
}

/* ── Toast ── */
function showToast(msg, dur = 2400) {
  const t = document.getElementById('tt-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const overlay = document.getElementById('player-overlay');
    if (overlay.classList.contains('open')) closePlayer();
  }
});

/* ── Swipe down to close ── */
(function() {
  let startY = 0;
  const sheet = document.getElementById('player-sheet');
  sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive:true });
  sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 80) closePlayer();
  }, { passive:true });
})();

/* ── Boot ── */
loadVideos();

/* ══════════════════════════════════════════════
   BACK BUTTON — double-back-to-exit system
   First back at root     → toast hint (2 s window)
   Second back within 2 s → show exit confirm sheet
   Back while player open → close player instead
   Mirrors customer/index implementation exactly.
══════════════════════════════════════════════ */
let _helpExitBackTs   = 0;
let _helpExitOpen     = false;

function _helpShowExit() {
  if (_helpExitOpen) return;
  _helpExitOpen = true;
  const overlay = document.getElementById('_help-exit-overlay');
  if (!overlay) return;
  overlay.style.display = 'flex';
  requestAnimationFrame(() => {
    const card = overlay.querySelector('._help-exit-card');
    if (card) card.style.transform = 'translateY(0)';
  });
}

function _helpHideExit() {
  _helpExitOpen   = false;
  _helpExitBackTs = 0;
  const overlay = document.getElementById('_help-exit-overlay');
  if (!overlay) return;
  const card = overlay.querySelector('._help-exit-card');
  if (card) card.style.transform = 'translateY(100%)';
  setTimeout(() => { overlay.style.display = 'none'; }, 320);
}

function _helpDoExit() {
  _helpHideExit();
  setTimeout(() => {
    try { window.close(); } catch(e) {}
    history.go(-(history.length));
  }, 200);
}

// Push initial state so first back press fires popstate
history.pushState({ helpPg: 'root' }, '', location.href);

// Patch openPlayer to also push a history state
const _origOpenPlayer = openPlayer;
openPlayer = function(id) {
  _origOpenPlayer(id);
  history.pushState({ helpPg: 'player' }, '', location.href);
};

// Patch closePlayer to also push a guard state (prevents double-pop)
const _origClosePlayer = closePlayer;
closePlayer = function() {
  _origClosePlayer();
  // Re-push root guard so subsequent back still triggers popstate
  setTimeout(() => {
    history.pushState({ helpPg: 'root' }, '', location.href);
  }, 390); // after close animation
};

window.addEventListener('popstate', () => {
  // If exit sheet is open — treat back as "Stay"
  if (_helpExitOpen) {
    history.pushState({ helpPg: 'root' }, '', location.href);
    _helpHideExit();
    return;
  }

  // If player is open — close it
  const overlay = document.getElementById('player-overlay');
  if (overlay && overlay.classList.contains('open')) {
    _origClosePlayer();
    history.pushState({ helpPg: 'root' }, '', location.href);
    return;
  }

  // At root — double-back-to-exit
  history.pushState({ helpPg: 'root' }, '', location.href);
  const now = Date.now();
  if (now - _helpExitBackTs < 2000) {
    _helpShowExit();
  } else {
    _helpExitBackTs = now;
    showToast('Press back again to exit', 2000);
  }
});
</script>

<!-- ══════════════════════════════════════════════
     EXIT CONFIRM — help.html back button guard
     Shown on second back-press at root screen.
══════════════════════════════════════════════ -->
<div id="_help-exit-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99999;align-items:flex-end;justify-content:center" onclick="_helpHideExit()">
  <div class="_help-exit-card" onclick="event.stopPropagation()" style="background:#fff;border-radius:20px 20px 0 0;padding:24px 24px calc(28px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;font-family:sans-serif;transform:translateY(100%);transition:transform 320ms cubic-bezier(.4,0,.2,1)">
    <div style="width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 20px"></div>
    <p style="font-size:18px;font-weight:800;margin:0 0 6px;color:#0f172a">Exit Help?</p>
    <p style="font-size:14px;color:#64748b;margin:0 0 24px;line-height:1.5">Go back to Tiffo or exit the app?</p>
    <div style="display:flex;gap:10px">
      <button onclick="_helpHideExit()" style="flex:1;padding:14px;border-radius:13px;border:1.5px solid #e2e8f0;background:#fff;font-size:15px;font-weight:700;cursor:pointer;color:#334155">Stay</button>
      <button onclick="window.location.href='./'" style="flex:1;padding:14px;border-radius:13px;border:none;background:#f97316;color:#fff;font-size:15px;font-weight:700;cursor:pointer">← Back to Tiffo</button>
    </div>
  </div>
</div>
