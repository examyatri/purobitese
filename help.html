<!DOCTYPE html>
<!-- TiffoTube help.html v5.1 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#e63946">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TiffoTube — Help &amp; Tutorials</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ── Design tokens ───────────────────────────────── */
:root {
  --p:#e63946; --pd:#c1121f; --pl:#fde8ea;
  --grad:linear-gradient(135deg,#e63946,#f4591d);
  --dk:#0f172a; --mid:#374151; --gr:#6b7280; --lt:#f1f3f5; --wh:#fff;
  --border:#eaecf0;
  --ff:'Sora',-apple-system,BlinkMacSystemFont,sans-serif;
  --fb:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --sh:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
  --sh-hover:0 4px 24px rgba(0,0,0,.14);
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
}

/* ── Reset ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{
  height:100%;
  overflow:hidden;
  background:#fff;
}
body{
  display:flex;
  flex-direction:column;
  height:100%;
  background:#fff;
  color:var(--dk);
  font-family:var(--fb);
}

/* ── Header ─────────────────────────────────────── */
#tt-header {
  flex-shrink:0;
  padding-top:calc(var(--sat) + 8px);
  padding-bottom:8px;
  padding-left:8px;
  padding-right:12px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:4px;
  z-index:200;
  box-shadow:0 1px 0 var(--border),0 2px 12px rgba(0,0,0,.04);
}
.tt-back {
  width:40px;height:40px;border:none;background:none;
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--mid);font-size:17px;
  transition:background .15s;
  flex-shrink:0;
}
.tt-back:hover,.tt-back:active{background:#f3f4f6}
.tt-logo {
  display:flex;align-items:center;gap:7px;
  cursor:pointer;text-decoration:none;
  flex:1;justify-content:center;
  user-select:none;
}
.tt-logo-badge {
  width:30px;height:30px;
  background:var(--grad);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;
  box-shadow:0 3px 8px rgba(230,57,70,.35);
  flex-shrink:0;
}
.tt-logo-text {
  font-family:var(--ff);font-weight:800;font-size:17px;
  color:var(--dk);letter-spacing:-.4px;line-height:1;
}
.tt-logo-text em{color:var(--p);font-style:normal}
#tt-search-btn {
  width:40px;height:40px;border:none;
  background:#f3f4f6;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--mid);font-size:15px;
  transition:background .15s;
  flex-shrink:0;
}
#tt-search-btn:hover{background:#e5e7eb}

/* ── Search bar ─────────────────────────────────── */
#tt-search-bar {
  flex-shrink:0;
  background:#fff;
  border-bottom:1px solid var(--border);
  overflow:hidden;
  max-height:0;
  opacity:0;
  padding:0 14px;
  transition:max-height .25s cubic-bezier(.4,0,.2,1),opacity .2s,padding .25s;
}
#tt-search-bar.open {
  max-height:60px;
  opacity:1;
  padding:8px 14px 10px;
}
.tt-search-inner {
  position:relative;
  display:flex;align-items:center;
}
.tt-search-icon {
  position:absolute;left:13px;
  color:var(--gr);font-size:13px;pointer-events:none;z-index:1;
}
#tt-search-input {
  width:100%;
  padding:9px 36px 9px 36px;
  border:1.5px solid #e5e7eb;
  border-radius:24px;
  font-family:var(--fb);font-size:14px;color:var(--dk);
  background:#f8fafc;outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
#tt-search-input:focus {
  border-color:var(--p);
  box-shadow:0 0 0 3px rgba(230,57,70,.1);
  background:#fff;
}
.tt-search-clear {
  position:absolute;right:11px;
  width:22px;height:22px;border:none;background:#e5e7eb;
  border-radius:50%;cursor:pointer;font-size:10px;color:var(--gr);
  display:none;align-items:center;justify-content:center;
  transition:background .15s;
}
.tt-search-clear.show{display:flex}
.tt-search-clear:hover{background:#d1d5db}

/* ── Category chips ─────────────────────────────── */
#tt-chips {
  flex-shrink:0;
  display:flex;gap:8px;
  padding:0 14px;
  height:48px;
  align-items:center;
  overflow-x:auto;
  scrollbar-width:none;
  background:#fff;
  border-bottom:1px solid var(--border);
}
#tt-chips::-webkit-scrollbar{display:none}
.chip {
  flex-shrink:0;
  padding:5px 14px;
  border-radius:20px;
  border:1.5px solid #e5e7eb;
  font-family:var(--ff);font-size:12px;font-weight:600;
  color:var(--gr);background:#fff;cursor:pointer;
  transition:all .18s;white-space:nowrap;
  user-select:none;
}
.chip.active {
  background:var(--p);color:#fff;border-color:var(--p);
  box-shadow:0 2px 8px rgba(230,57,70,.3);
}
.chip:not(.active):hover{border-color:#c4c9d4;color:var(--mid)}

/* ── Scroll area ────────────────────────────────── */
#tt-scroll {
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding-bottom:calc(80px + var(--sab) + 24px);
  background:#fff;
}

/* ── Section header ─────────────────────────────── */
.tt-section-hd {
  padding:16px 14px 10px;
  font-family:var(--ff);font-weight:700;font-size:11.5px;
  color:var(--gr);letter-spacing:.6px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
  grid-column:1/-1;
}
.tt-section-hd::after {
  content:'';flex:1;height:1px;background:var(--border);
}

/* ── Video grid ─────────────────────────────────── */
.tt-grid {
  display:grid;
  grid-template-columns:1fr;
  gap:0;
  padding:0;
}
@media(min-width:600px){
  .tt-grid{grid-template-columns:repeat(2,1fr);gap:12px;padding:0 12px 8px}
  .tt-section-hd{padding-left:12px;padding-right:12px}
}
@media(min-width:900px){
  .tt-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:1200px){
  .tt-grid{grid-template-columns:repeat(4,1fr)}
  body{max-width:1200px;margin:0 auto}
}
@media(max-width:360px){
  .tt-logo-text{font-size:15px}
  .chip{font-size:11px;padding:4px 11px}
}

/* ── Video card — YouTube mobile style ─────────── */
.vcard {
  background:#fff;
  cursor:pointer;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
  display:flex;
  flex-direction:column;
  border-bottom:8px solid var(--lt);
  margin-bottom:0;
}
@media(min-width:600px){
  .vcard{border-bottom:none;border-radius:12px;box-shadow:var(--sh);overflow:hidden}
  .vcard:hover{box-shadow:var(--sh-hover);transform:translateY(-1px);transition:all .2s}
}
.vcard:active{background:#f9f9f9}

/* Thumbnail */
.vcard-thumb {
  position:relative;
  width:100%;
  padding-top:56.25%;
  background:#111;
  overflow:hidden;
  flex-shrink:0;
}
.vcard-thumb img {
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;display:block;
  transition:transform .3s;
}
.vcard:active .vcard-thumb img{transform:scale(1.02)}
.vcard-thumb-placeholder {
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
}
.vcard-thumb-overlay {
  position:absolute;bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(to top,rgba(0,0,0,.4),transparent);
  pointer-events:none;
}
.vcard-play {
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.15);
  opacity:0;transition:opacity .2s;
}
.vcard:hover .vcard-play,.vcard:active .vcard-play{opacity:1}
.vcard-play-circle {
  width:48px;height:48px;
  background:rgba(230,57,70,.9);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;padding-left:3px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.vcard-wide .vcard-play-circle{width:56px;height:56px;font-size:20px}
.vcard-wide .vcard-title{font-size:15px}
.vcard-wide{grid-column:1/-1}
/* Inline player active — always full width in grid */
.vcard.inline-active{grid-column:1/-1}
.vcard-cat-dot {
  position:absolute;top:8px;left:8px;
  padding:3px 9px;border-radius:20px;
  font-size:10px;font-family:var(--ff);font-weight:700;
  backdrop-filter:blur(8px);letter-spacing:.2px;
  pointer-events:none;
}
.vcard-badge {
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,.75);
  color:#fff;font-size:10px;font-family:var(--ff);font-weight:600;
  padding:3px 7px;border-radius:4px;
  display:flex;align-items:center;gap:4px;
  pointer-events:none;
}

/* Card body */
.vcard-body {
  display:flex;flex-direction:row;
  align-items:flex-start;
  gap:10px;
  padding:12px 12px 14px;
}
.vcard-avatar {
  width:36px;height:36px;flex-shrink:0;
  border-radius:50%;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;
  margin-top:1px;
}
.vcard-text{flex:1;min-width:0}
.vcard-title {
  font-family:var(--ff);font-weight:700;font-size:14px;
  color:var(--dk);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:4px;
}
.vcard-meta {
  display:flex;align-items:center;flex-wrap:wrap;gap:5px;
  font-size:12px;color:var(--gr);font-family:var(--fb);
}
.vcard-meta-dot{width:3px;height:3px;border-radius:50%;background:#d1d5db;flex-shrink:0}
.vcard-more {
  width:32px;height:32px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--gr);font-size:16px;
  border-radius:50%;transition:background .15s;
}
.vcard-more:hover{background:#f3f4f6}

/* ── Inline player — replaces thumbnail in card ── */
.vcard-inline-player {
  position:relative;
  width:100%;
  background:#000;
  overflow:hidden;
  flex-shrink:0;
}
.vcard-inline-player iframe {
  display:block;
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
}
.vcard-inline-close {
  position:absolute;top:8px;right:8px;
  width:30px;height:30px;
  background:rgba(0,0,0,.65);
  border:none;border-radius:50%;
  color:#fff;font-size:13px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:background .15s;
}
.vcard-inline-close:hover{background:rgba(0,0,0,.85)}

/* ── Skeleton ────────────────────────────────────── */
#tt-skeleton{display:flex;flex-direction:column;gap:0;padding:0}
.sk-card{background:#fff;display:flex;flex-direction:column;border-bottom:8px solid var(--lt)}
.sk-thumb{
  width:100%;padding-top:56.25%;
  background:#e8eaed;position:relative;overflow:hidden;flex-shrink:0;
}
.sk-thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.65) 50%,transparent 100%);
  animation:shimmer 1.5s infinite;
}
.sk-body{display:flex;flex-direction:row;align-items:flex-start;gap:10px;padding:12px 12px 14px}
.sk-avatar{width:36px;height:36px;border-radius:50%;background:#e8eaed;flex-shrink:0}
.sk-text{flex:1}
.sk-line{height:10px;background:#e8eaed;border-radius:6px;margin-bottom:7px;overflow:hidden;position:relative}
.sk-line::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.65) 50%,transparent 100%);
  animation:shimmer 1.5s infinite;
}
.sk-line.short{width:55%}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ── Empty state ─────────────────────────────────── */
#tt-empty {
  display:none;text-align:center;padding:52px 28px;
}
#tt-empty i{font-size:42px;color:#d1d5db;margin-bottom:14px;display:block}
#tt-empty h3{font-family:var(--ff);font-size:15px;font-weight:700;color:var(--mid);margin-bottom:6px}
#tt-empty p{font-size:13px;color:var(--gr);font-family:var(--fb);line-height:1.6}

/* ── Footer ─────────────────────────────────────── */
#tt-footer {
  position:fixed;
  bottom:0;left:0;right:0;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding:8px 12px;
  padding-bottom:calc(var(--sab) + 8px);
  gap:10px;
  min-height:calc(64px + var(--sab));
  box-shadow:0 -2px 16px rgba(0,0,0,.05);
  z-index:100;
}
.tt-fbtn {
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  min-height:44px;
  padding:11px 10px;border-radius:12px;border:none;
  font-family:var(--ff);font-size:13px;font-weight:700;
  cursor:pointer;transition:all .18s;text-decoration:none;
  user-select:none;color:#fff;
}
.tt-fbtn:active{transform:scale(.96)}
.tt-fbtn-offer{
  background:linear-gradient(135deg,#f59e0b,#f4591d);
  box-shadow:0 3px 10px rgba(245,158,11,.3);
}
.tt-fbtn-wa{
  background:#25d366;
  box-shadow:0 3px 10px rgba(37,211,102,.3);
}
.tt-fbtn-offer:hover{box-shadow:0 4px 14px rgba(245,158,11,.4)}
.tt-fbtn-wa:hover{box-shadow:0 4px 14px rgba(37,211,102,.4)}

/* ── Toast ──────────────────────────────────────── */
#tt-toast {
  position:fixed;
  bottom:calc(64px + var(--sab) + 14px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:#0f172a;color:#fff;border-radius:24px;
  padding:9px 20px;opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;pointer-events:none;
  font-family:var(--fb);font-size:13px;font-weight:500;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);
  max-width:calc(100vw - 40px);
}
#tt-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Exit confirm sheet ─────────────────────────── */
#_help-exit-overlay {
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  z-index:99999;
  display:none;
  align-items:flex-end;justify-content:center;
}
._help-exit-card {
  background:#fff;border-radius:20px 20px 0 0;
  padding:24px 24px calc(28px + var(--sab));
  width:100%;max-width:480px;
  transform:translateY(100%);
  transition:transform 320ms cubic-bezier(.4,0,.2,1);
}
._help-exit-hd{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 20px}
._help-exit-title{font-family:var(--ff);font-size:18px;font-weight:800;margin:0 0 6px;color:var(--dk)}
._help-exit-sub{font-family:var(--fb);font-size:14px;color:#64748b;margin:0 0 24px;line-height:1.5}
._help-exit-btns{display:flex;gap:10px}
._help-exit-stay{flex:1;padding:14px;border-radius:13px;border:1.5px solid #e2e8f0;background:#fff;font-family:var(--ff);font-size:15px;font-weight:700;cursor:pointer;color:#334155}
._help-exit-go{flex:1;padding:14px;border-radius:13px;border:none;background:var(--grad);color:#fff;font-family:var(--ff);font-size:15px;font-weight:700;cursor:pointer}

</style>
</head>
<body>

<!-- ── Header ── -->
<header id="tt-header">
  <button class="tt-back" onclick="window.location.href='./'" aria-label="Back to Tiffo">
    <i class="fa-solid fa-arrow-left"></i>
  </button>
  <a class="tt-logo" onclick="resetFilters()" href="javascript:void(0)" aria-label="TiffoTube home">
    <div class="tt-logo-badge"><i class="fa-brands fa-youtube"></i></div>
    <div class="tt-logo-text">Tiffo<em>Tube</em></div>
  </a>
  <button id="tt-search-btn" onclick="toggleSearch()" aria-label="Search videos">
    <i class="fa-solid fa-magnifying-glass"></i>
  </button>
</header>

<!-- ── Search bar ── -->
<div id="tt-search-bar" role="search">
  <div class="tt-search-inner">
    <i class="fa-solid fa-magnifying-glass tt-search-icon"></i>
    <input id="tt-search-input" type="search" inputmode="search"
      placeholder="Search help videos…" autocomplete="off" autocorrect="off"
      oninput="onSearchInput(this.value)">
    <button class="tt-search-clear" id="tt-search-clear" onclick="clearSearch()" aria-label="Clear">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
</div>

<!-- ── Category chips ── -->
<div id="tt-chips" role="tablist" aria-label="Filter by category">
  <div class="chip active" role="tab" aria-selected="true" onclick="setChip('all',this)">All</div>
</div>

<!-- ── Main scroll area ── -->
<main id="tt-scroll">

  <!-- Skeleton -->
  <div id="tt-skeleton">
    <div class="sk-card"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-avatar"></div><div class="sk-text"><div class="sk-line"></div><div class="sk-line short"></div></div></div></div>
    <div class="sk-card"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-avatar"></div><div class="sk-text"><div class="sk-line"></div><div class="sk-line short"></div></div></div></div>
    <div class="sk-card"><div class="sk-thumb"></div><div class="sk-body"><div class="sk-avatar"></div><div class="sk-text"><div class="sk-line"></div><div class="sk-line short"></div></div></div></div>
  </div>

  <div id="tt-content"></div>

  <div id="tt-empty">
    <i class="fa-solid fa-film"></i>
    <h3 id="tt-empty-title">No videos found</h3>
    <p id="tt-empty-sub">Try searching with different keywords,<br>or browse a different category.</p>
  </div>

</main>

<!-- ── Footer ── -->
<footer id="tt-footer">
  <button class="tt-fbtn tt-fbtn-offer" onclick="window.location.href='offer.html'">
    <i class="fa-solid fa-tag"></i> Offers
  </button>
  <button class="tt-fbtn tt-fbtn-wa" onclick="openWA()">
    <i class="fa-brands fa-whatsapp"></i> WhatsApp Help
  </button>
</footer>

<!-- ── Toast ── -->
<div id="tt-toast" role="status" aria-live="polite"></div>

<!-- ── Exit confirm sheet ── -->
<div id="_help-exit-overlay" onclick="_helpHideExit()">
  <div class="_help-exit-card" id="_help-exit-card" onclick="event.stopPropagation()">
    <div class="_help-exit-hd"></div>
    <p class="_help-exit-title">Exit Help?</p>
    <p class="_help-exit-sub">Go back to Tiffo or stay on TiffoTube?</p>
    <div class="_help-exit-btns">
      <button class="_help-exit-stay" onclick="_helpHideExit()">Stay</button>
      <button class="_help-exit-go" onclick="window.location.href='./'">← Back to Tiffo</button>
    </div>
  </div>
</div>

<script src="https://purobitese-api.onrender.com/config.js" async></script>
<script>
/* ═══════════════════════════════════════════════════
   TiffoTube — help.html v5.1
   Reliable data loading: Stale-While-Revalidate +
   Self-Healing + Retry-with-Backoff + Tab-Visibility
   ═══════════════════════════════════════════════════ */

const API_BASE = 'https://purobitese-api.onrender.com';

let _videos      = [];
let _activeChip  = 'all';
let _searchQ     = '';
let _searchTimer = null;
let _loadError   = false;
let _fetching    = false;   // prevent duplicate in-flight requests

let CAT = {
  all:     { label:'All',     color:'#e63946', bg:'#fde8ea' },
  general: { label:'General', color:'#475569', bg:'#f1f5f9' },
};

/* ══════════════════════════════════════════════════
   CACHE  (stale-while-revalidate, 6-hour TTL)
   • _cacheGet()  — validates integrity before returning.
                    Corrupt/empty/expired → null → fresh fetch.
   • _cacheSet()  — only writes if data is a valid array.
   ══════════════════════════════════════════════════ */
const _CACHE_KEY = 'tt_helpdata_v3';
const _TTL       = 6 * 60 * 60 * 1000;   // 6 hours (data rarely changes)

function _cacheGet() {
  try {
    const raw = localStorage.getItem(_CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    // Integrity check: must have ts, cats array, non-empty videos array
    if (!obj || typeof obj.ts !== 'number') return null;
    if (!Array.isArray(obj.cats))   return null;
    if (!Array.isArray(obj.videos) || obj.videos.length === 0) return null;
    if (Date.now() - obj.ts > _TTL) return null;   // expired
    return { cats: obj.cats, videos: obj.videos };
  } catch { return null; }
}

function _cacheSet(cats, videos) {
  // Only cache if we actually got real data
  if (!Array.isArray(videos) || videos.length === 0) return;
  try {
    localStorage.setItem(_CACHE_KEY, JSON.stringify({ ts: Date.now(), cats, videos }));
  } catch {
    // localStorage full or unavailable — silent, not a crash
  }
}

function _cacheClear() {
  try { localStorage.removeItem(_CACHE_KEY); } catch {}
}

/* ══════════════════════════════════════════════════
   API KEY
   ══════════════════════════════════════════════════ */
function _getKey() {
  return window.__TIFFO_API_KEY__ || localStorage.getItem('tf_api_key') || '';
}
let _ensureKeyPromise = null;
function _ensureKey() {
  if (_getKey()) return Promise.resolve();
  if (_ensureKeyPromise) return _ensureKeyPromise;
  _ensureKeyPromise = fetch(API_BASE + '/config.js')
    .then(r => r.text())
    .then(t => {
      const m = t.match(/window\.__TIFFO_API_KEY__\s*=\s*"([^"]*)"/);
      if (m) { window.__TIFFO_API_KEY__ = m[1]; localStorage.setItem('tf_api_key', m[1]); }
    })
    .catch(() => {})
    .finally(() => { _ensureKeyPromise = null; });
  return _ensureKeyPromise;
}

/* ══════════════════════════════════════════════════
   CATEGORIES
   ══════════════════════════════════════════════════ */
function _applyCategories(cats) {
  CAT = { all: { label:'All', color:'#e63946', bg:'#fde8ea' } };
  (cats || []).forEach(c => { CAT[c.slug] = { label: c.label, color: c.color, bg: c.bg_color }; });
  const chipsEl = document.getElementById('tt-chips');
  if (!chipsEl) return;
  const allChip = chipsEl.querySelector('.chip');
  chipsEl.innerHTML = '';
  if (allChip) chipsEl.appendChild(allChip);
  (cats || []).forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.role = 'tab';
    chip.setAttribute('aria-selected', 'false');
    chip.textContent = c.label;
    chip.onclick = function() { setChip(c.slug, this); };
    chipsEl.appendChild(chip);
  });
}

/* ══════════════════════════════════════════════════
   CORE FETCH  (one DB hit, returns parsed data or throws)
   ══════════════════════════════════════════════════ */
async function _fetchFromServer() {
  await _ensureKey();
  const res = await fetch(API_BASE + '/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'getHelpData', data: {}, apiKey: _getKey() })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  const cats   = data.categories || [];
  const videos = (data.videos || []).sort((a,b) => (a.order_index||0) - (b.order_index||0));
  return { cats, videos };
}

/* ══════════════════════════════════════════════════
   RETRY WITH BACKOFF
   3 attempts: immediate → 2s → 8s
   Accepts ANY successful response (even 0 videos —
   admin may have no videos yet; that is valid state).
   Returns null only on network/parse error.
   ══════════════════════════════════════════════════ */
async function _fetchWithRetry(attempts = 3) {
  const delays = [0, 2000, 8000];
  for (let i = 0; i < attempts; i++) {
    if (delays[i]) await new Promise(r => setTimeout(r, delays[i]));
    try {
      const result = await _fetchFromServer();
      return result;   // success — even if 0 videos, that's a valid DB state
    } catch { /* network/parse error — try next */ }
  }
  return null;   // all attempts failed (network down / server error)
}

/* ══════════════════════════════════════════════════
   LOAD VIDEOS — Stale-While-Revalidate strategy
   ──────────────────────────────────────────────────
   FAST PATH  (cache valid):
     1. Show cached data immediately — zero wait
     2. Fetch fresh in background, update cache
     3. Re-render only if content actually changed
   COLD PATH  (no cache / force):
     1. Show skeleton
     2. Fetch with up to 3 retries (0s → 2s → 8s)
     3. Render result (or error state)
   ══════════════════════════════════════════════════ */
async function loadVideos(force) {
  if (_fetching) return;
  _fetching  = true;
  _loadError = false;

  const skelEl = document.getElementById('tt-skeleton');
  const cached = force ? null : _cacheGet();

  if (cached) {
    /* ── FAST PATH ── */
    _applyCategories(cached.cats);
    _videos = cached.videos;
    skelEl.style.display = 'none';
    render();

    /* ── BACKGROUND REFRESH (fire-and-forget) ── */
    _fetchWithRetry(2)
      .then(fresh => {
        if (!fresh) return;   // network failed — keep existing cache & data
        _cacheSet(fresh.cats, fresh.videos);
        // Re-render only if something changed (avoid unnecessary DOM churn)
        const changed =
          fresh.videos.length !== _videos.length ||
          fresh.videos.some((v, i) => {
            const old = _videos[i];
            return !old || v.id !== old.id || v.youtube_url !== old.youtube_url || v.title !== old.title;
          });
        if (changed) {
          _applyCategories(fresh.cats);
          _videos = fresh.videos;
          render();
        }
      })
      .catch(() => {})          // safety net — never crash the page
      .finally(() => { _fetching = false; });
    return;                     // _fetching released by .finally above
  }

  /* ── COLD PATH ── */
  try {
    const fresh = await _fetchWithRetry(3);
    if (fresh !== null) {
      _cacheSet(fresh.cats, fresh.videos);
      _applyCategories(fresh.cats);
      _videos    = fresh.videos;
      _loadError = false;
    } else {
      // All retries failed (network/server down)
      _videos    = [];
      _loadError = true;
    }
  } catch {
    _videos    = [];
    _loadError = true;
  }
  skelEl.style.display = 'none';
  render();
  _fetching = false;
}

/* ══════════════════════════════════════════════════
   SELF-HEALING: page visibility + periodic check
   • When user comes back to the tab AND _videos is
     empty → trigger a fresh fetch immediately.
   • Periodic 5-min heartbeat: if _videos is empty
     (e.g. fetch failed on load), try again quietly.
   ══════════════════════════════════════════════════ */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && _videos.length === 0) {
    loadVideos(true);
  }
});

setInterval(() => {
  if (_videos.length === 0 && !_fetching) {
    loadVideos(true);
  }
}, 5 * 60 * 1000);

/* ── YouTube helpers ── */
function ytId(url) {
  if (!url) return '';
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : '';
}
function ytThumb(url) {
  const id = ytId(url);
  return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : '';
}
function ytEmbed(url) {
  const id = ytId(url);
  return id ? `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1` : '';
}

/* ── Aspect ratio: sync, no network call ──
   Rule: /shorts/ URL → 9:16 portrait (177.78%)
         everything else → 16:9 landscape (56.25%)
   oEmbed was async + CORS-blocked in PWA scope → removed entirely.
   YouTube Shorts URLs always contain /shorts/ — this is 100% reliable.
   Regular videos: 16:9 covers 99%+ of content; edge-case portrait
   regular videos will pillarbox inside the iframe, which is acceptable.
─────────────────────────────────────────── */
function _isShort(url) {
  return /youtube\.com\/shorts\//i.test(url || '');
}
function _getAspect(url) {
  return _isShort(url)
    ? { pct: 140, isPortrait: true }   // capped at 140% so card stays usable
    : { pct: 56.25, isPortrait: false };
}

/* ── Escape HTML ── */
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Filter ── */
function filteredVideos() {
  let list = _videos;
  if (_activeChip !== 'all') list = list.filter(v => v.category === _activeChip);
  if (_searchQ) {
    const q = _searchQ.toLowerCase();
    list = list.filter(v =>
      (v.title||'').toLowerCase().includes(q) ||
      (v.description||'').toLowerCase().includes(q)
    );
  }
  return list;
}

/* ── Build card ── */
function buildCard(v, wide) {
  const thumb    = ytThumb(v.youtube_url);
  const catCfg   = CAT[v.category] || CAT.general || { label:'Help', color:'#6b7280', bg:'#f3f4f6' };
  const wideClass = wide ? ' vcard-wide' : '';
  const isShort  = _isShort(v.youtube_url);
  const thumbPt  = isShort ? '177.78%' : '56.25%';

  const thumbContent = thumb
    ? `<img src="${esc(thumb)}" alt="${esc(v.title)}" loading="lazy"
         onerror="this.closest('.vcard-thumb').innerHTML='<div class=vcard-thumb-placeholder><i class=\\'fa-solid fa-play\\' style=\\'font-size:32px;color:#c4b5fd\\'></i></div>'">`
    : `<div class="vcard-thumb-placeholder"><i class="fa-solid fa-circle-play" style="font-size:32px;color:#c4b5fd"></i></div>`;

  return `
    <div class="vcard${wideClass}" id="vcard-${v.id}" data-cat="${esc(v.category)}" data-url="${esc(v.youtube_url)}"
      onclick="handleCardClick(${v.id})" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter')handleCardClick(${v.id})">
      <div class="vcard-thumb" style="padding-top:${thumbPt}">
        ${thumbContent}
        <div class="vcard-thumb-overlay"></div>
        <div class="vcard-play"><div class="vcard-play-circle"><i class="fa-solid fa-play" style="margin-left:3px"></i></div></div>
        <div class="vcard-cat-dot" style="background:${esc(catCfg.bg)};color:${esc(catCfg.color)}">${esc(catCfg.label)}</div>
        <div class="vcard-badge">${isShort ? '<i class="fa-solid fa-mobile-screen" style="font-size:8px"></i> Short' : '<i class="fa-solid fa-play" style="font-size:8px"></i> Watch'}</div>
      </div>
      <div class="vcard-body">
        <div class="vcard-avatar"><i class="fa-brands fa-youtube"></i></div>
        <div class="vcard-text">
          <div class="vcard-title">${esc(v.title)}</div>
          <div class="vcard-meta">
            <span>TiffoTube</span>
            <span class="vcard-meta-dot"></span>
            <span>${esc(catCfg.label)}</span>
            <span class="vcard-meta-dot"></span>
            <span>Tap to watch</span>
          </div>
        </div>
        <div class="vcard-more"><i class="fa-solid fa-ellipsis-vertical"></i></div>
      </div>
    </div>`;
}

/* ── Render ── */
function render() {
  const list    = filteredVideos();
  const content = document.getElementById('tt-content');
  const empty   = document.getElementById('tt-empty');

  if (!list.length) {
    content.innerHTML = '';
    empty.style.display = 'block';
    const isError = _loadError && !_searchQ && _activeChip === 'all';
    document.getElementById('tt-empty-title').textContent = isError ? 'Could not load videos' : 'No videos found';
    document.getElementById('tt-empty-sub').innerHTML = isError
      ? 'Check your connection and try again.<br><button onclick="_retryLoad()" style="margin-top:14px;padding:9px 22px;border-radius:20px;border:none;background:var(--grad);color:#fff;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;">↺ Retry</button>'
      : _searchQ
        ? `No results for "${esc(_searchQ)}" — try different keywords`
        : 'No videos in this category yet. Check back soon!';
    return;
  }
  empty.style.display = 'none';

  if (_activeChip === 'all' && !_searchQ) {
    const cats = Object.keys(CAT).filter(k => k !== 'all');
    let html = '';
    const first = list[0];
    if (first) {
      html += `<div class="tt-grid"><div class="tt-section-hd">⭐ Featured</div>${buildCard(first, true)}</div>`;
    }
    cats.forEach(cat => {
      const group = list.filter(v => v.category === cat && v.id !== first?.id);
      if (!group.length) return;
      const catCfg = CAT[cat] || { label: cat };
      html += `<div class="tt-grid"><div class="tt-section-hd">${esc(catCfg.label)}</div>`;
      group.forEach(v => { html += buildCard(v, false); });
      html += `</div>`;
    });
    content.innerHTML = html;
  } else {
    const hd = _searchQ
      ? `<div class="tt-section-hd">${list.length} result${list.length!==1?'s':''} for "${esc(_searchQ)}"</div>`
      : `<div class="tt-section-hd">${esc((CAT[_activeChip]||{label:_activeChip}).label)} · ${list.length} video${list.length!==1?'s':''}</div>`;
    content.innerHTML = `<div class="tt-grid">${hd}${list.map(v=>buildCard(v,false)).join('')}</div>`;
  }
}

/* ═══════════════════════════════════════════════════
   INLINE PLAYER — lives inside the card thumbnail
   ═══════════════════════════════════════════════════ */
let _inlineActiveId = null;

function handleCardClick(id) {
  const v = _videos.find(x => x.id === id);
  if (!v) return;

  // Close existing inline player first
  _closeInlinePlayer();

  // Ratio is now sync — no async, no race condition
  const ratioInfo = _getAspect(v.youtube_url);
  _playInline(v, ratioInfo);

  // Push history state for back button handling
  history.pushState({ helpPg:'player' }, '', location.href);
}

function _playInline(v, ratioInfo) {
  const card = document.getElementById('vcard-' + v.id);
  if (!card) return;
  const embedUrl = ytEmbed(v.youtube_url);
  if (!embedUrl) { showToast('Invalid video link'); return; }

  _inlineActiveId = v.id;

  const inlineEl = document.createElement('div');
  inlineEl.className = 'vcard-inline-player';
  inlineEl.style.paddingTop = ratioInfo.pct.toFixed(2) + '%';
  inlineEl.innerHTML = `
    <iframe src="${embedUrl}" title="${(v.title||'').replace(/"/g,'&quot;')}"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>
    <button class="vcard-inline-close" onclick="event.stopPropagation();_closeInlinePlayer()" aria-label="Close video">
      <i class="fa-solid fa-xmark"></i>
    </button>`;

  const thumb = card.querySelector('.vcard-thumb');
  if (thumb) {
    thumb.style.display = 'none';
    card.insertBefore(inlineEl, thumb);
  }
  card.classList.add('inline-active');
  setTimeout(() => card.scrollIntoView({ behavior:'smooth', block:'start' }), 50);
}

function _closeInlinePlayer() {
  if (_inlineActiveId === null) return;
  const card = document.getElementById('vcard-' + _inlineActiveId);
  if (card) {
    const inline = card.querySelector('.vcard-inline-player');
    if (inline) inline.remove();
    const thumb = card.querySelector('.vcard-thumb');
    if (thumb) thumb.style.display = '';
    card.classList.remove('inline-active');
  }
  _inlineActiveId = null;
}

/* ── Search ── */
function onSearchInput(val) {
  clearTimeout(_searchTimer);
  document.getElementById('tt-search-clear').classList.toggle('show', val.length > 0);
  _searchTimer = setTimeout(() => {
    _searchQ = val.trim();
    render();
  }, 220);
}

function toggleSearch() {
  const bar = document.getElementById('tt-search-bar');
  const btn = document.getElementById('tt-search-btn');
  const isOpen = bar.classList.toggle('open');
  btn.innerHTML = isOpen
    ? '<i class="fa-solid fa-xmark"></i>'
    : '<i class="fa-solid fa-magnifying-glass"></i>';
  if (isOpen) {
    setTimeout(() => document.getElementById('tt-search-input').focus(), 120);
  } else {
    clearSearch();
  }
}

function clearSearch() {
  const inp = document.getElementById('tt-search-input');
  if (inp) inp.value = '';
  document.getElementById('tt-search-clear').classList.remove('show');
  _searchQ = '';
  render();
}

/* ── Chips ── */
function setChip(cat, el) {
  _activeChip = cat;
  document.querySelectorAll('#tt-chips .chip').forEach(c => {
    c.classList.remove('active');
    c.setAttribute('aria-selected','false');
  });
  el.classList.add('active');
  el.setAttribute('aria-selected','true');
  render();
  el.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

function resetFilters() {
  _activeChip = 'all';
  _searchQ    = '';
  document.querySelectorAll('#tt-chips .chip').forEach((c,i) => {
    c.classList.toggle('active', i===0);
    c.setAttribute('aria-selected', i===0 ? 'true':'false');
  });
  const inp = document.getElementById('tt-search-input');
  if (inp) inp.value = '';
  const bar = document.getElementById('tt-search-bar');
  if (bar && bar.classList.contains('open')) toggleSearch();
  render();
}

/* ── WhatsApp ── */
function openWA() {
  const msg = encodeURIComponent(
    '\uD83C\uDD98 *Tiffo \u2014 Help Request*\n' +
    '\u2501'.repeat(28) + '\n' +
    'Hi Tiffo Team! \uD83D\uDC4B\n\n' +
    'I need help. Please assist me.\n\n' +
    'Thank you! \uD83D\uDE4F'
  );
  window.open('https://wa.me/919889760350?text=' + msg, '_blank');
}

/* ── Toast ── */
function showToast(msg, dur = 2400) {
  const t = document.getElementById('tt-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _inlineActiveId !== null) _closeInlinePlayer();
});

/* ═══════════════════════════════════════════════════
   BACK BUTTON / HISTORY SYSTEM
   Priority:
   1. Exit sheet open → dismiss
   2. Inline player open → close it
   3. At root → double-back-to-exit
   ═══════════════════════════════════════════════════ */
let _helpExitBackTs = 0;
let _helpExitOpen   = false;

function _helpShowExit() {
  if (_helpExitOpen) return;
  _helpExitOpen = true;
  const overlay = document.getElementById('_help-exit-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => {
    document.getElementById('_help-exit-card').style.transform = 'translateY(0)';
  });
}

function _helpHideExit() {
  _helpExitOpen   = false;
  _helpExitBackTs = 0;
  const overlay = document.getElementById('_help-exit-overlay');
  document.getElementById('_help-exit-card').style.transform = 'translateY(100%)';
  setTimeout(() => { overlay.style.display = 'none'; }, 320);
}

// Push initial state on load
history.pushState({ helpPg:'root' }, '', location.href);

window.addEventListener('popstate', () => {
  // 1. Exit sheet open → dismiss
  if (_helpExitOpen) {
    history.pushState({ helpPg:'root' }, '', location.href);
    _helpHideExit();
    return;
  }

  // 2. Inline player open → close it
  if (_inlineActiveId !== null) {
    _closeInlinePlayer();
    _helpExitBackTs = 0;
    // Push root guard immediately — no delay gap for double-tap
    history.pushState({ helpPg:'root' }, '', location.href);
    return;
  }

  // 3. At root → double-back-to-exit
  history.pushState({ helpPg:'root' }, '', location.href);
  const now = Date.now();
  if (now - _helpExitBackTs < 2000) {
    _helpShowExit();
  } else {
    _helpExitBackTs = now;
    showToast('Press back again to exit', 2000);
  }
});

/* ── Manual retry (shown in error state) ── */
function _retryLoad() {
  _cacheClear();
  _loadError = false;
  document.getElementById('tt-skeleton').style.display = 'flex';
  document.getElementById('tt-empty').style.display    = 'none';
  document.getElementById('tt-content').innerHTML      = '';
  loadVideos(true);
}

/* ── Boot ── */
loadVideos();
</script>
