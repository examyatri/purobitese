<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tifo Deals | Premium Coupons</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(251,191,36,0.15), transparent 30%),
    radial-gradient(circle at bottom right, rgba(59,130,246,0.12), transparent 30%),
    linear-gradient(135deg, #050816, #0f172a 45%, #111827);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  overflow-x: hidden;
}

.container {
  width: 100%;
  max-width: 1100px;
  position: relative;
  border-radius: 32px;
  padding: 45px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow:
    0 25px 70px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

.container::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 32px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(251,191,36,0.3), rgba(59,130,246,0.25));
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  flex-wrap: wrap;
  gap: 20px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 58px;
  height: 58px;
  border-radius: 18px;
  background: linear-gradient(135deg, #f59e0b, #fbbf24);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #111827;
  font-size: 24px;
  font-weight: 800;
  box-shadow: 0 10px 25px rgba(251,191,36,0.35);
}

.brand-text h1 {
  font-size: 34px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -1px;
  background: linear-gradient(to right, #fff, #dbeafe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand-text p {
  color: #94a3b8;
  font-size: 15px;
}

.premium-tag {
  background: linear-gradient(135deg, #f59e0b, #fbbf24);
  color: #111827;
  padding: 12px 20px;
  border-radius: 999px;
  font-weight: 700;
  letter-spacing: 1px;
  font-size: 13px;
  box-shadow: 0 10px 25px rgba(251,191,36,0.25);
}

.table-wrapper {
  overflow: hidden;
  border-radius: 24px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: rgba(255,255,255,0.06);
}

thead th {
  padding: 22px;
  text-align: left;
  font-size: 14px;
  color: #e2e8f0;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

tbody tr {
  transition: 0.3s ease;
  border-top: 1px solid rgba(255,255,255,0.06);
}

tbody tr:hover {
  background: rgba(255,255,255,0.05);
  transform: scale(1.01);
}

tbody td {
  padding: 24px 22px;
  color: #f8fafc;
  font-size: 15px;
}

.offer-name {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 5px;
}

.offer-desc {
  font-size: 13px;
  color: #94a3b8;
}

.discount {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 16px;
  border-radius: 12px;
  background: rgba(34,197,94,0.12);
  color: #4ade80;
  font-weight: 700;
}

.coupon {
  display: inline-block;
  padding: 12px 18px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  border: 1px dashed rgba(255,255,255,0.2);
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
}

.copy-btn {
  border: none;
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: white;
  padding: 13px 20px;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s ease;
  box-shadow: 0 10px 25px rgba(59,130,246,0.25);
}

.copy-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 30px rgba(59,130,246,0.4);
}

.success-message {
  margin-top: 28px;
  padding: 18px;
  border-radius: 16px;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.2);
  text-align: center;
  color: #4ade80;
  font-weight: 600;
  display: none;
}

@media (max-width: 850px) {
  .container {
    padding: 24px;
  }

  .top-bar {
    flex-direction: column;
    align-items: flex-start;
  }

  .brand-text h1 {
    font-size: 28px;
  }

  table, thead, tbody, th, td, tr {
    display: block;
  }

  thead {
    display: none;
  }

  tbody tr {
    margin-bottom: 18px;
    border-radius: 18px;
    overflow: hidden;
  }

  tbody td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }

  tbody td::before {
    content: attr(data-label);
    color: #94a3b8;
    font-weight: 600;
  }
}

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Tifo Premium Coupons</h1>
      <p>Unlock premium savings with exclusive verified offers.</p>
      <div class="premium-badge">EXCLUSIVE DEALS</div>
    </div><table>
  <thead>
    <tr>
      <th>Offer Name</th>
      <th>Discount</th>
      <th>Coupon Code</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td data-label="Offer">
        <span class="offer-name">Premium Welcome Offer</span>
      </td>
      <td data-label="Discount">
        <span class="discount">50% OFF</span>
      </td>
      <td data-label="Coupon">
        <span class="coupon-code">SAVE50</span>
      </td>
      <td data-label="Action">
        <button class="copy-btn" onclick="copyCoupon('SAVE50')">
          Copy Coupon
        </button>
      </td>
    </tr>

    <tr>
      <td data-label="Offer">
        <span class="offer-name">Exclusive Festival Deal</span>
      </td>
      <td data-label="Discount">
        <span class="discount">30% OFF</span>
      </td>
      <td data-label="Coupon">
        <span class="coupon-code">FEST30</span>
      </td>
      <td data-label="Action">
        <button class="copy-btn" onclick="copyCoupon('FEST30')">
          Copy Coupon
        </button>
      </td>
    </tr>

    <tr>
      <td data-label="Offer">
        <span class="offer-name">VIP Member Savings</span>
      </td>
      <td data-label="Discount">
        <span class="discount">20% OFF</span>
      </td>
      <td data-label="Coupon">
        <span class="coupon-code">VIP20</span>
      </td>
      <td data-label="Action">
        <button class="copy-btn" onclick="copyCoupon('VIP20')">
          Copy Coupon
        </button>
      </td>
    </tr>
  </tbody>
</table>

<div class="success-message" id="successMessage">
  Coupon copied successfully.
</div>

  </div>  <script>
    function copyCoupon(code) {
      navigator.clipboard.writeText(code).then(() => {
        const successMessage = document.getElementById('successMessage');
        successMessage.style.display = 'block';
        successMessage.innerHTML = `Coupon Code <strong>${code}</strong> copied successfully!`;

        setTimeout(() => {
          successMessage.style.display = 'none';
        }, 2500);
      });
    }
  </script></body>
</html>
