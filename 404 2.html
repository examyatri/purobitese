<!DOCTYPE html>

<meta charset="UTF-8">
<title>Tiffo</title>
<script>
  // GitHub Pages SPA redirect: any 404 → index.html (always opens home)
  window.location.replace(
    (location.origin || '') +
    location.pathname.split('/').slice(0, 2).join('/') + '/'
  );
</script>
</head>
