<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#e63946">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Tiffo Rider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --p:#e63946;--pd:#c1121f;--pl:#fde8ea;
  --g:#2a9d8f;--gl:#e0f5f2;
  --o:#f4a261;--y:#f59e0b;
  --bg:#f4f6f9;--wh:#ffffff;--card:#ffffff;
  --tx:#1a1f2e;--mu:#6b7280;--lt:#e5e7eb;
  --sh:0 1px 8px rgba(0,0,0,.08);
  --shl:0 4px 20px rgba(0,0,0,.12);
  --r:14px;
  --ff:'Sora',sans-serif;
  --fb:'DM Sans',sans-serif;
  --day:#d97706;--dayb:#fffbeb;--daybd:#fde68a;
  --ngt:#4f46e5;--ngtb:#eef2ff;--ngtbd:#c7d2fe;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:var(--fb);color:var(--tx);max-width:520px;margin:0 auto;min-height:100vh}

/* Auth */
#pg-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0f172a,#1e293b)}
.auth-card{background:white;border-radius:20px;padding:32px;width:100%;max-width:360px;box-shadow:var(--shl)}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo .icon{font-size:48px}
.auth-logo h1{font-family:var(--ff);font-size:22px;font-weight:700;margin-top:8px}
.auth-logo p{color:var(--mu);font-size:13px}

/* App */
#pg-app{display:none;padding-bottom:24px}

/* Top nav */
#topnav{background:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh);position:sticky;top:0;z-index:100}
.rider-name{font-family:var(--ff);font-weight:700;font-size:16px}
.rider-id{font-size:11px;color:var(--mu)}
.online-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);background:white;border-bottom:1px solid var(--lt);padding:12px 0}
.stat-item{text-align:center}
.stat-num{font-family:var(--ff);font-weight:700;font-size:22px;color:var(--p)}
.stat-lbl{font-size:11px;color:var(--mu)}

/* Route button */
.route-btn{margin:12px 16px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;border:none;border-radius:12px;padding:13px;font-family:var(--ff);font-weight:600;font-size:14px;width:calc(100% - 32px);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

/* Tabs */
.tabs{display:flex;background:white;border-bottom:1px solid var(--lt)}
.tab{flex:1;padding:13px;text-align:center;font-family:var(--ff);font-weight:600;font-size:13px;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;transition:all 200ms}
.tab.act{color:var(--p);border-bottom-color:var(--p)}
.tab .badge{background:var(--p);color:white;border-radius:10px;padding:1px 7px;font-size:10px;margin-left:6px}

/* Search */
.search-bar{margin:12px 16px;background:white;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;box-shadow:var(--sh)}
.search-bar input{border:none;outline:none;flex:1;font-family:var(--fb);font-size:14px;background:transparent}
.search-bar button{background:none;border:none;cursor:pointer;color:var(--mu);font-size:16px;padding:0 2px}

/* Date section */
.date-section{margin:12px 16px 0}
.date-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;user-select:none}
.date-label{font-family:var(--ff);font-weight:700;font-size:15px}
.date-toggle{color:var(--mu);font-size:12px}

/* Session group */
.session-group{margin-bottom:8px}
.session-header{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;font-family:var(--ff);font-weight:600;font-size:12px;margin-bottom:8px;justify-content:space-between}
.session-morning{background:var(--dayb);color:var(--day);border:1px solid var(--daybd)}
.session-evening{background:var(--ngtb);color:var(--ngt);border:1px solid var(--ngtbd)}
.session-route-btn{background:none;border:1px solid currentColor;border-radius:8px;padding:3px 8px;font-family:var(--ff);font-size:11px;cursor:pointer;color:inherit}

/* Order card */
.o-card{background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--sh);transition:opacity 300ms,transform 300ms}
.o-card.done{opacity:.55}
.o-card-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.o-id{font-family:monospace;font-size:11px;color:var(--mu)}
.o-name{font-weight:600;font-size:15px}
.o-phone{color:var(--g);font-size:13px;text-decoration:none}
.o-addr{font-size:13px;color:var(--mu);line-height:1.4}
.o-items{font-size:13px}
.o-amount{font-family:var(--ff);font-weight:700;font-size:15px}
.o-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.o-btn{border:none;border-radius:8px;padding:7px 12px;font-family:var(--ff);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.o-btn-call{background:#dcfce7;color:#166534}
.o-btn-map{background:#dbeafe;color:#1e40af}
.o-btn-wa{background:#f0fdf4;color:#15803d}
.o-btn-done{background:var(--p);color:white;flex:1;justify-content:center}
.o-btn-done:disabled{opacity:.6;cursor:not-allowed}

/* Payment badge */
.pay-cash{background:#fef3c7;color:#92400e;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:600}
.pay-wallet{background:#dcfce7;color:#166634;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:600}

/* Filter chips */
.r-filter-chip{border:1.5px solid var(--lt);border-radius:20px;background:white;padding:5px 13px;font-family:var(--ff);font-size:12px;font-weight:600;color:var(--mu);cursor:pointer;transition:all 160ms;white-space:nowrap}
.r-filter-chip:hover{border-color:#94a3b8;color:var(--tx)}
.r-filter-chip.act{background:var(--p);color:white;border-color:var(--p)}
.r-filter-chip[data-slot="morning"].act{background:var(--day);border-color:var(--day)}
.r-filter-chip[data-slot="evening"].act{background:var(--ngt);border-color:var(--ngt)}

/* Toast */
#r-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1f2e;color:white;border-radius:24px;padding:10px 20px;font-size:14px;opacity:0;transition:all 300ms;z-index:9999;white-space:nowrap;pointer-events:none}
#r-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Route modal */
#route-modal{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:520px;background:white;border-radius:20px 20px 0 0;box-shadow:var(--shl);padding:20px;z-index:1000;transition:transform 350ms cubic-bezier(.4,0,.2,1)}
#route-modal.open{transform:translateX(-50%) translateY(0)}
.route-addr-list{max-height:50vh;overflow-y:auto}
.route-addr-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--lt)}
.route-num{background:var(--p);color:white;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{color:var(--mu);font-size:14px}

/* Forms */
.r-field{margin-bottom:14px}
.r-field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.r-field input{width:100%;padding:12px 14px;border:1.5px solid var(--lt);border-radius:10px;font-family:var(--fb);font-size:15px;outline:none;transition:border-color 200ms}
.r-field input:focus{border-color:var(--p)}
.r-btn-p{background:var(--p);color:white;border:none;border-radius:12px;padding:14px;font-family:var(--ff);font-weight:600;font-size:15px;width:100%;cursor:pointer;margin-top:4px}
.r-btn-p:disabled{opacity:.6;cursor:not-allowed}

/* Loading */
.loading-wrap{text-align:center;padding:48px 20px;color:var(--mu);font-size:14px}

/* Pull-to-Refresh */
#ptr-zone-rider{
  position:fixed;top:0;left:0;right:0;z-index:999;
  height:0;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  background:#fff;border-bottom:1px solid #f0f0f0;
  transition:height 200ms ease;
  font-size:13px;color:#94a3b8;font-family:var(--ff);
}
.ptr-arrow-r{display:inline-block;transition:transform 250ms ease;font-size:16px}
.ptr-spinner-r{display:none;width:16px;height:16px;border:2px solid #f0f0f0;
  border-top-color:var(--p);border-radius:50%;animation:ptr-spin .7s linear infinite}
@keyframes ptr-spin{to{transform:rotate(360deg)}}
/* Global Progress Bar */
#g-progress-bar-r{position:fixed;top:0;left:0;right:0;height:3px;z-index:10000;pointer-events:none}
#gp-fill-r{position:absolute;top:0;left:0;height:100%;width:0%;background:linear-gradient(90deg,var(--p),#ff6b35);border-radius:0 3px 3px 0;transition:width 0ms linear;box-shadow:0 0 8px rgba(230,57,70,.5)}
#gp-pct-r{position:absolute;top:4px;right:8px;font-family:var(--ff);font-size:10px;font-weight:700;color:var(--p);opacity:0;background:rgba(255,255,255,.92);border-radius:8px;padding:1px 6px;box-shadow:0 1px 4px rgba(0,0,0,.12)}
/* PTR progress in zone */
.ptr-prog-wrap-r{width:80%;max-width:240px;display:none;flex-direction:column;align-items:center;gap:3px}
.ptr-prog-track-r{width:100%;height:3px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.ptr-prog-fill-r{height:100%;width:0%;background:linear-gradient(90deg,var(--p),#ff6b35);border-radius:3px;transition:width 300ms ease}
.ptr-prog-pct-r{font-family:var(--ff);font-size:11px;font-weight:700;color:var(--p)}
</style>
</head>
<body>

<!-- Auth Page -->
<div id="pg-auth">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🛵</div>
      <h1>Tiffo Rider</h1>
      <p>Delivery Partner Portal</p>
    </div>
    <div id="auth-creds-hint" style="display:none;background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:#166534">
      ✅ Credentials loaded — tap Login
    </div>
    <div class="r-field">
      <label>Rider ID</label>
      <input id="r-id" type="text" placeholder="e.g. RDR-18042026-0001" autocomplete="username">
    </div>
    <div class="r-field" style="position:relative">
      <label>Password</label>
      <input id="r-pw" type="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px">
      <button onclick="togglePw('r-pw',this)" style="position:absolute;right:12px;bottom:12px;background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px">👁</button>
    </div>
    <button id="r-login-btn" class="r-btn-p" onclick="doRiderLogin()" style="position:relative;overflow:hidden">Login<div id="bp-rlogin" style="position:absolute;bottom:0;left:0;height:3px;width:0%;background:rgba(255,255,255,.55);border-radius:0;transition:width 380ms ease;pointer-events:none"></div><span id="bpp-rlogin" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:rgba(255,255,255,.9);display:none;pointer-events:none"></span></button>
  </div>
</div>

<!-- App -->
<div id="pg-app">

  <!-- Global Progress Bar -->
  <div id="g-progress-bar-r"><div id="gp-fill-r"></div><div id="gp-pct-r"></div></div>

  <!-- Pull-to-Refresh indicator -->
  <div id="ptr-zone-rider">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="ptr-arrow-r" id="ptr-arrow-rider">↓</span>
      <span id="ptr-txt-rider">Pull to refresh</span>
    </div>
    <div class="ptr-prog-wrap-r" id="ptr-prog-wrap-r">
      <div class="ptr-prog-track-r"><div class="ptr-prog-fill-r" id="ptr-prog-fill-r"></div></div>
      <div class="ptr-prog-pct-r" id="ptr-prog-pct-r">0%</div>
    </div>
  </div>

  <!-- Top Nav -->
  <nav id="topnav">
    <div>
      <div class="rider-name" id="rider-name">Rider</div>
      <div class="rider-id"><span class="online-dot"></span><span id="rider-id-display"></span></div>
    </div>
    <button onclick="doRiderLogout()" style="background:#fee2e2;color:#c1121f;border:none;border-radius:8px;padding:8px 14px;font-family:var(--ff);font-weight:600;font-size:13px;cursor:pointer">Logout</button>
  </nav>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num" id="stat-delivered">0</div><div class="stat-lbl">Delivered Today</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-pending">0</div><div class="stat-lbl">Pending Today</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Total Delivered</div></div>
  </div>

  <!-- Route Planner -->
  <button class="route-btn" onclick="openRouteModal(_pending.filter(o=>_isSlotMatch(o,_appliedSlot)))">🗺 Plan Route for All Pending</button>

  <!-- Main Tabs -->
  <div class="tabs">
    <div class="tab act" id="tab-pending" onclick="switchTab('pending')">
      🛵 Pending <span class="badge" id="pending-count">0</span>
    </div>
    <div class="tab" id="tab-delivered" onclick="switchTab('delivered')">
      ✅ Delivered <span class="badge" style="background:var(--g)" id="delivered-count">0</span>
    </div>
  </div>

  <!-- Filter Panel -->
  <div id="filter-panel" style="background:white;border-bottom:1px solid var(--lt);padding:12px 16px">

    <!-- Layer 1: Date Filter -->
    <div style="margin-bottom:10px">
      <div style="font-family:var(--ff);font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px">📅 Date</div>
      <div style="display:flex;gap:6px">
        <button class="r-filter-chip act" data-date="today"     onclick="setDateFilter('today',this)">Today</button>
        <button class="r-filter-chip"     data-date="yesterday" onclick="setDateFilter('yesterday',this)">Yesterday</button>
        <button class="r-filter-chip"     data-date="day_before" onclick="setDateFilter('day_before',this)">2 Days Ago</button>
        <button class="r-filter-chip"     data-date="all"       onclick="setDateFilter('all',this)">All</button>
      </div>
    </div>

    <!-- Layer 2: Session Filter -->
    <div style="margin-bottom:12px">
      <div style="font-family:var(--ff);font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px">🕐 Session</div>
      <div style="display:flex;gap:6px">
        <button class="r-filter-chip act" data-slot="all"     onclick="setSlotFilter('all',this)">All Orders</button>
        <button class="r-filter-chip"     data-slot="morning" onclick="setSlotFilter('morning',this)">☀️ Morning</button>
        <button class="r-filter-chip"     data-slot="evening" onclick="setSlotFilter('evening',this)">🌙 Evening</button>
      </div>
    </div>

    <!-- Search + Buttons Row -->
    <div style="display:flex;gap:8px;align-items:center">
      <div style="flex:1;display:flex;align-items:center;gap:8px;background:#f4f6f9;border-radius:10px;padding:8px 12px;border:1.5px solid transparent;transition:border-color 200ms" id="search-wrap-inner">
        <span style="color:#94a3b8;font-size:13px">🔍</span>
        <input id="r-search" type="text" placeholder="Name, phone, address, ID…"
          style="border:none;outline:none;flex:1;font-family:var(--fb);font-size:13.5px;background:transparent;color:var(--tx)"
          onfocus="document.getElementById('search-wrap-inner').style.borderColor='var(--p)'"
          onblur="document.getElementById('search-wrap-inner').style.borderColor='transparent'"
          onkeydown="if(event.key==='Enter')applyFilters()">
        <button onclick="clearFilters()" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:14px;padding:0;line-height:1">✕</button>
      </div>
      <button onclick="applyFilters()" style="background:var(--p);color:white;border:none;border-radius:10px;padding:9px 14px;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px">
        🔍 Search
      </button>
      <button onclick="generateRiderPDF()" style="background:#1e293b;color:white;border:none;border-radius:10px;padding:9px 12px;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px">
        📄 PDF
      </button>
    </div>

    <!-- Active filter summary -->
    <div id="filter-summary" style="margin-top:8px;font-family:var(--fb);font-size:12px;color:var(--mu);display:none"></div>
  </div>

  <!-- Orders Content -->
  <div id="orders-content" style="padding:0 16px 16px"></div>

</div><!-- /pg-app -->

<!-- Route Modal Overlay -->
<div id="route-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:none" onclick="closeRouteModal()"></div>

<!-- Route Modal -->
<div id="route-modal">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div style="font-family:var(--ff);font-weight:700;font-size:17px">🗺 Route Plan</div>
    <button onclick="closeRouteModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">✕</button>
  </div>
  <div class="route-addr-list" id="route-list"></div>
  <button onclick="openInMaps()" style="width:100%;margin-top:16px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;border:none;border-radius:12px;padding:13px;font-family:var(--ff);font-weight:600;font-size:14px;cursor:pointer">
    📍 Open in Google Maps
  </button>
</div>

<!-- Toast -->
<div id="r-toast"></div>

<script>
/* ─── CONFIG ─────────────────────────────────────────── */
const CFG = {
  API:      'https://purobitese-api.onrender.com/api',
  KEY:      'PB_SECURE_API_KEY_2026',
  WA_ADMIN: '919889760350'
};

/* ─── STATE ──────────────────────────────────────────── */
let _rider          = null;
let _orders         = [];
let _pending        = [];
let _delivered      = [];
let _activeTab      = 'pending';
let _routeAddresses = [];
let _pollTimer      = null;

// Filter state — applied only when Search button is clicked
let _filterDate     = 'today';   // 'today' | 'yesterday' | 'day_before' | 'all'
let _filterSlot     = 'all';     // 'all' | 'morning' | 'evening'
let _filterQuery    = '';        // name/phone/address/id text search
// Applied filters (what is actually rendered — updated on Search click)
let _appliedDate    = 'today';
let _appliedSlot    = 'all';
let _appliedQuery   = '';

/* ─── CREDENTIAL MANAGEMENT (key: tf_rider_creds) ───── */
function saveRiderCreds(riderId, pw) {
  localStorage.setItem('tf_rider_creds', JSON.stringify({ riderId, pw }));
}
function getRiderCreds() {
  try { return JSON.parse(localStorage.getItem('tf_rider_creds')); } catch { return null; }
}
function clearRiderCreds() {
  localStorage.removeItem('tf_rider_creds');
}

/* ─── RIDER SESSION CACHE (key: tf_rider_session) ────────
   Stores rider object in localStorage so the app loads
   instantly on every visit — no API call needed.
   Background verify runs at most once every 48 hours,
   30 seconds after home screen loads (server not busy).
──────────────────────────────────────────────────────── */
const RiderSession = {
  KEY:             'tf_rider_session',
  VERIFY_KEY:      'tf_rider_session_verified_at',
  VERIFY_INTERVAL: 48 * 60 * 60 * 1000, // 48 hours in ms

  save(rider) {
    localStorage.setItem(this.KEY, JSON.stringify({ rider, savedAt: Date.now() }));
  },
  get() {
    try {
      const d = JSON.parse(localStorage.getItem(this.KEY));
      if (!d || !d.rider) return null;
      return d.rider;
    } catch { return null; }
  },
  clear() {
    localStorage.removeItem(this.KEY);
    localStorage.removeItem(this.VERIFY_KEY);
  },
  shouldVerify() {
    const last = parseInt(localStorage.getItem(this.VERIFY_KEY) || '0', 10);
    return Date.now() - last > this.VERIFY_INTERVAL;
  },
  markVerified() {
    localStorage.setItem(this.VERIFY_KEY, String(Date.now()));
  }
};

/* ─── API WRAPPER ────────────────────────────────────── */
/* ── Rider Progress Bar Engine ── */
const RPB = (() => {
  let _gpTimer = null, _gpPct = 0, _gpDone = false;
  let _bpTimers = {};

  function gpShow() {
    const fill = document.getElementById('gp-fill-r');
    const pctEl = document.getElementById('gp-pct-r');
    if (!fill) return;
    _gpDone = false; _gpPct = 0; clearInterval(_gpTimer);
    fill.style.transition = 'none'; fill.style.width = '0%'; fill.style.opacity = '1';
    fill.style.background = 'linear-gradient(90deg,var(--p),#ff6b35)';
    if (pctEl) { pctEl.style.opacity = '1'; pctEl.textContent = '0%'; }
    requestAnimationFrame(() => {
      fill.style.transition = 'width 400ms ease'; fill.style.width = '15%'; _gpPct = 15;
      _gpTimer = setInterval(() => {
        if (_gpDone) return;
        const step = Math.max(0.4, (88 - _gpPct) * 0.04);
        _gpPct = Math.min(88, _gpPct + step);
        fill.style.transition = 'width 600ms ease'; fill.style.width = _gpPct + '%';
        if (pctEl) pctEl.textContent = Math.round(_gpPct) + '%';
      }, 600);
    });
  }
  function gpDone() {
    _gpDone = true; clearInterval(_gpTimer);
    const fill = document.getElementById('gp-fill-r');
    const pctEl = document.getElementById('gp-pct-r');
    if (!fill) return;
    fill.style.transition = 'width 280ms ease'; fill.style.width = '100%';
    if (pctEl) pctEl.textContent = '100%';
    setTimeout(() => {
      fill.style.transition = 'opacity 350ms ease'; fill.style.opacity = '0';
      if (pctEl) pctEl.style.opacity = '0';
      setTimeout(() => { fill.style.transition = 'none'; fill.style.width = '0%'; fill.style.opacity = '1'; }, 450);
    }, 320);
  }
  function gpError() {
    clearInterval(_gpTimer);
    const fill = document.getElementById('gp-fill-r');
    if (!fill) return;
    fill.style.background = '#ef4444';
    setTimeout(() => {
      fill.style.transition = 'opacity 400ms ease'; fill.style.opacity = '0';
      setTimeout(() => { fill.style.transition = 'none'; fill.style.width = '0%'; fill.style.opacity = '1'; fill.style.background = 'linear-gradient(90deg,var(--p),#ff6b35)'; const p = document.getElementById('gp-pct-r'); if(p) p.style.opacity='0'; }, 450);
    }, 550);
  }
  function ptrStart() {
    const fill = document.getElementById('ptr-prog-fill-r');
    const pctEl = document.getElementById('ptr-prog-pct-r');
    const wrap  = document.getElementById('ptr-prog-wrap-r');
    if (!fill) return;
    if (wrap) wrap.style.display = 'flex';
    clearInterval(fill._t); fill.style.transition = 'none'; fill.style.width = '0%';
    if (pctEl) pctEl.textContent = '0%';
    let pct = 0;
    fill._t = setInterval(() => {
      const step = Math.max(0.5, (88 - pct) * 0.045);
      pct = Math.min(88, pct + step);
      fill.style.transition = 'width 500ms ease'; fill.style.width = pct + '%';
      if (pctEl) pctEl.textContent = Math.round(pct) + '%';
    }, 500);
  }
  function ptrDone() {
    const fill = document.getElementById('ptr-prog-fill-r');
    const pctEl = document.getElementById('ptr-prog-pct-r');
    const wrap  = document.getElementById('ptr-prog-wrap-r');
    if (!fill) return;
    clearInterval(fill._t);
    fill.style.transition = 'width 220ms ease'; fill.style.width = '100%';
    if (pctEl) pctEl.textContent = '100%';
    setTimeout(() => { if (wrap) wrap.style.display = 'none'; fill.style.transition = 'none'; fill.style.width = '0%'; if (pctEl) pctEl.textContent = '0%'; }, 480);
  }
  function btnStart(fillId, pctId) {
    const fill = document.getElementById(fillId); const pctEl = document.getElementById(pctId);
    if (!fill) return;
    clearInterval(_bpTimers[fillId]);
    fill.style.transition = 'none'; fill.style.width = '0%'; fill.style.background = 'rgba(255,255,255,.55)'; fill.style.opacity = '1';
    if (pctEl) { pctEl.style.display = 'inline'; pctEl.textContent = '0%'; }
    let pct = 0;
    _bpTimers[fillId] = setInterval(() => {
      if (pct >= 48) { clearInterval(_bpTimers[fillId]); return; }
      const step = Math.max(0.8, (48 - pct) * 0.07);
      pct = Math.min(48, pct + step);
      fill.style.transition = 'width 380ms ease'; fill.style.width = pct + '%';
      if (pctEl) pctEl.textContent = Math.round(pct) + '%';
      fill._bpPct = pct;
    }, 350);
    fill._bpPct = 0;
  }
  function btnRetry(fillId, pctId) {
    const fill = document.getElementById(fillId); const pctEl = document.getElementById(pctId);
    if (!fill) return;
    clearInterval(_bpTimers[fillId]);
    fill.style.background = 'rgba(255,170,0,.65)';
    setTimeout(() => {
      fill.style.background = 'rgba(255,255,255,.55)';
      let pct = fill._bpPct || 48;
      _bpTimers[fillId] = setInterval(() => {
        if (pct >= 80) { clearInterval(_bpTimers[fillId]); return; }
        const step = Math.max(0.3, (80 - pct) * 0.03);
        pct = Math.min(80, pct + step); fill.style.transition = 'width 500ms ease'; fill.style.width = pct + '%';
        if (pctEl) pctEl.textContent = Math.round(pct) + '%'; fill._bpPct = pct;
      }, 600);
    }, 400);
  }
  function btnDone(fillId, pctId) {
    const fill = document.getElementById(fillId); const pctEl = document.getElementById(pctId);
    if (!fill) return;
    clearInterval(_bpTimers[fillId]);
    fill.style.transition = 'width 180ms ease'; fill.style.width = '100%';
    if (pctEl) pctEl.textContent = '100%';
    setTimeout(() => {
      fill.style.transition = 'opacity 300ms ease'; fill.style.opacity = '0';
      setTimeout(() => { fill.style.transition = 'none'; fill.style.width = '0%'; fill.style.opacity = '1'; if (pctEl) { pctEl.style.display = 'none'; pctEl.textContent = ''; } }, 400);
    }, 280);
  }
  function btnError(fillId, pctId) {
    const fill = document.getElementById(fillId); const pctEl = document.getElementById(pctId);
    if (!fill) return;
    clearInterval(_bpTimers[fillId]);
    fill.style.background = 'rgba(239,68,68,.65)'; fill.style.transition = 'width 120ms ease'; fill.style.width = '100%';
    setTimeout(() => {
      fill.style.transition = 'opacity 400ms ease'; fill.style.opacity = '0';
      setTimeout(() => { fill.style.transition = 'none'; fill.style.width = '0%'; fill.style.opacity = '1'; fill.style.background = 'rgba(255,255,255,.55)'; if (pctEl) { pctEl.style.display = 'none'; pctEl.textContent = ''; } }, 500);
    }, 480);
  }
  return { gpShow, gpDone, gpError, ptrStart, ptrDone, btnStart, btnRetry, btnDone, btnError };
})();

async function api(action, data = {}, _retry = 1, _onRetry = null) {
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 22000);
  try {
    const res  = await fetch(CFG.API, {
      method: 'POST', signal: ctrl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, data, apiKey: CFG.KEY })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json;
  } catch(e) {
    if (_retry > 0 && (e.name === 'AbortError' || e.name === 'TypeError')) {
      if (_onRetry) _onRetry();
      return api(action, data, _retry - 1, _onRetry);
    }
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function doRiderLogin() {
  const riderId = document.getElementById('r-id').value.trim();
  const pw      = document.getElementById('r-pw').value;
  if (!riderId) { rToast('Enter Rider ID'); return; }
  if (!pw)      { rToast('Enter password'); return; }

  const btn = document.getElementById('r-login-btn');
  btn.disabled = true; btn.style.opacity = '0.88';
  RPB.btnStart('bp-rlogin', 'bpp-rlogin');

  try {
    const res = await api('riderLogin', { riderId, password: pw }, 1,
      () => RPB.btnRetry('bp-rlogin', 'bpp-rlogin')
    );
    RPB.btnDone('bp-rlogin', 'bpp-rlogin');
    _rider = res.rider;
    saveRiderCreds(riderId, pw);
    RiderSession.save(_rider);
    showApp();

/* ─── ORDER LOADING ──────────────────────────────────── */
async function loadOrders() {
  if (!_rider) return;
  try {
    const res  = await api('getRiderOrders', { riderId: _rider.rider_id });
    _orders    = res.orders || [];
    _pending   = _orders.filter(o => {
      const s = (o.order_status||'').toLowerCase();
      return s !== 'delivered' && s !== 'rejected' && s !== 'cancelled';
    });
    _delivered = _orders.filter(o => o.order_status === 'delivered');
    updateStats();
    renderOrders();
  } catch(e) { /* silent poll error */ }
}

function updateStats() {
  const today    = new Date(Date.now() + 5.5 * 3600000).toISOString().slice(0, 10);
  const todayDel = _delivered.filter(o => o.date === today);
  const todayPen = _pending.filter(o => o.date === today);
  document.getElementById('stat-delivered').textContent  = todayDel.length;
  document.getElementById('stat-pending').textContent    = todayPen.length;
  document.getElementById('stat-total').textContent      = _delivered.length;
  document.getElementById('pending-count').textContent   = _pending.length;
  document.getElementById('delivered-count').textContent = _delivered.length;
}

  const payClass  = o.user_type === 'subscriber' ? 'pay-wallet' : 'pay-cash';
  const payLabel  = o.user_type === 'subscriber' ? '💳 Wallet'  : '💵 Cash';
  const safeAddr  = (o.address || '').replace(/'/g, "\\'");
  const safeName  = (o.name    || '').replace(/'/g, "\\'");
  const safePhone = o.phone || '';

    ? `<span style="background:${o.slot==='morning'?'#fffbeb':'#eef2ff'};color:${o.slot==='morning'?'#d97706':'#4f46e5'};border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;font-family:var(--ff)">${o.slot==='morning'?'☀️ Morning':'🌙 Evening'}</span>`

  } else {
    actionBtns = `
      <button class="o-btn" style="background:#e0f2fe;color:#0369a1;flex:1;justify-content:center" id="out-btn-${o.order_id}" onclick="markOutForDelivery('${o.order_id}')">🛵 Out for Delivery</button>
      <button class="o-btn o-btn-done" id="del-btn-${o.order_id}" onclick="markDelivered('${o.order_id}')">✅ Done</button>`;
  }

  return `
  <div class="o-card ${isDone ? 'done' : ''}" id="card-${o.order_id}">
    <div class="o-card-row">
      <div style="display:flex;flex-direction:column;gap:3px">
        <span class="o-id">${o.order_id}</span>
        ${slotBadge}
      </div>
      <span class="${payClass}">${payLabel}</span>
    </div>
    <div style="margin-bottom:6px">
      <span class="o-name">👤 ${o.name || '—'}</span>
      <a href="tel:${safePhone}" class="o-phone" style="margin-left:10px">📞 ${safePhone}</a>
    </div>

    <div class="o-card-row">

      <button class="o-btn o-btn-map"  onclick="openMaps('${safeAddr}')">🗺 Maps</button>
      <button class="o-btn o-btn-wa"   onclick="openWA('91${safePhone}','Hi ${safeName}, your Tiffo order is on the way!')">💬 WA</button>
      ${actionBtns}
    </div>
  </div>`;
}

/* ─── MARK OUT FOR DELIVERY ──────────────────────────── */
async function markOutForDelivery(orderId) {
  const btn  = document.getElementById('out-btn-' + orderId);
  const card = document.getElementById('card-' + orderId);
  if (!btn || btn.disabled) return;
  btn.textContent = '…'; btn.disabled = true;
  try {
    await api('updateOrderStatus', { orderId, status: 'out for delivery', riderId: _rider.rider_id });
    const o = _pending.find(o => o.order_id === orderId);
    if (o) o.order_status = 'out for delivery';
    renderOrders();
    rToast('🛵 Out for delivery!');
  } catch(e) {
    btn.textContent = '🛵 Out for Delivery'; btn.disabled = false;
    rToast('Failed: ' + (e.message || 'Try again'));
  }
}

/* ─── MARK DELIVERED (optimistic UI) ─────────────────── */
async function markDelivered(orderId) {
  const btn  = document.getElementById('del-btn-' + orderId);
  const card = document.getElementById('card-' + orderId);
  if (!btn || btn.disabled) return;
  btn.textContent = '…'; btn.disabled = true;
  card.style.opacity = '0.6';
  try {
    await api('updateOrderStatus', { orderId, status: 'delivered', riderId: _rider.rider_id });
    const idx = _pending.findIndex(o => o.order_id === orderId);
    if (idx !== -1) {
      const order = { ..._pending[idx], order_status: 'delivered' };
      _pending.splice(idx, 1);
      _delivered.unshift(order);
    }
    updateStats();
    renderOrders();
    rToast('✅ Delivered!');
  } catch(e) {
    card.style.opacity = '1';
    btn.textContent = '✅ Mark Delivered'; btn.disabled = false;
    rToast('Failed: ' + (e.message || 'Try again'));
  }
}

/* ─── DATE HELPERS ───────────────────────────────────── */
function _getDateStr(offset) {
  return new Date(Date.now() + 5.5*3600000 - offset*86400000).toISOString().slice(0,10);
}
function _isSlotMatch(o, slotFilter) {
  if (slotFilter === 'all') return true;
  // If order has explicit slot field use it
  if (o.slot) return o.slot === slotFilter;
  // Otherwise infer from time
  const raw = o.time || '00:00';
  const isPM = raw.toUpperCase().includes('PM');
  let h = parseInt(raw.split(':')[0]);
  const h24 = isPM && h !== 12 ? h+12 : (!isPM && h === 12 ? 0 : h);
  return slotFilter === 'morning' ? h24 < 15 : h24 >= 15;
}

/* ─── RENDER ─────────────────────────────────────────── */
function renderOrders() {
  const baseList = _activeTab === 'pending' ? _pending : _delivered;
  const today     = _getDateStr(0);
  const yesterday = _getDateStr(1);
  const dayBefore = _getDateStr(2);

  let list = baseList.filter(o => {
    // Layer 1: date
    const d = o.date || '';
    if (_appliedDate === 'today'      && d !== today)     return false;
    if (_appliedDate === 'yesterday'  && d !== yesterday)  return false;
    if (_appliedDate === 'day_before' && d !== dayBefore)  return false;
    // Layer 2: slot/session
    if (!_isSlotMatch(o, _appliedSlot)) return false;
    // Search query
    if (_appliedQuery) {
      const q = _appliedQuery;
      if (!(o.name||'').toLowerCase().includes(q) &&
          !(o.phone||'').includes(q) &&
          !(o.address||'').toLowerCase().includes(q) &&
          !(o.order_id||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const el = document.getElementById('orders-content');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">${_activeTab==='pending'?'🎉':'📦'}</div><p>No orders match the current filter</p></div>`;
    return;
  }

  // Group by date → session
  const grouped = {};
  list.forEach(o => {
    const d = o.date || 'Unknown';
    if (!grouped[d]) grouped[d] = { morning:[], evening:[] };
    if (_isSlotMatch(o,'morning')) grouped[d].morning.push(o);
    else grouped[d].evening.push(o);
  });

  const dateLabel = d => {
    if (d === today)     return 'Today · ' + fmtDateShort(d);
    if (d === yesterday) return 'Yesterday · ' + fmtDateShort(d);
    if (d === dayBefore) return '2 Days Ago · ' + fmtDateShort(d);
    const [y,m,dd] = d.split('-'); return `${dd}/${m}/${y}`;
  };
  function fmtDateShort(d) {
    if (!d || !/^\d{4}/.test(d)) return d;
    const [y,m,dd] = d.split('-');
    return `${dd}/${m}`;
  }

  const sortedDates = Object.keys(grouped).sort().reverse();
  el.innerHTML = sortedDates.map(date => {
    const grp = grouped[date];
    const showMorning = (_appliedSlot === 'all' || _appliedSlot === 'morning') && grp.morning.length;
    const showEvening = (_appliedSlot === 'all' || _appliedSlot === 'evening') && grp.evening.length;
    const mJson = JSON.stringify(grp.morning).replace(/"/g,'&quot;');
    const eJson = JSON.stringify(grp.evening).replace(/"/g,'&quot;');
    return `<div class="date-section">
      <div class="date-header" onclick="toggleDateSection('${date}')">
        <span class="date-label">${dateLabel(date)}</span>
        <span class="date-toggle" id="dt-toggle-${date}">▼</span>
      </div>
      <div id="dt-body-${date}">
        ${showMorning ? `<div class="session-group">
          <div class="session-header session-morning">
            <span>☀️ Morning (${grp.morning.length})</span>
            <button class="session-route-btn" onclick="event.stopPropagation();openRouteModal('${mJson}')">🗺 Route</button>
          </div>
          ${grp.morning.map(o => renderOrderCard(o)).join('')}
        </div>` : ''}
        ${showEvening ? `<div class="session-group">
          <div class="session-header session-evening">
            <span>🌙 Evening (${grp.evening.length})</span>
            <button class="session-route-btn" onclick="event.stopPropagation();openRouteModal('${eJson}')">🗺 Route</button>
          </div>
          ${grp.evening.map(o => renderOrderCard(o)).join('')}
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ─── PDF EXPORT (respects active filters) ───────────── */
function generateRiderPDF() {
  const baseList = _activeTab === 'pending' ? _pending : _delivered;
  const today     = _getDateStr(0);
  const yesterday = _getDateStr(1);
  const dayBefore = _getDateStr(2);

  const filtered = baseList.filter(o => {
    const d = o.date || '';
    if (_appliedDate === 'today'      && d !== today)     return false;
    if (_appliedDate === 'yesterday'  && d !== yesterday)  return false;
    if (_appliedDate === 'day_before' && d !== dayBefore)  return false;
    if (!_isSlotMatch(o, _appliedSlot)) return false;
    if (_appliedQuery) {
      const q = _appliedQuery;
      if (!(o.name||'').toLowerCase().includes(q) && !(o.phone||'').includes(q) &&
          !(o.address||'').toLowerCase().includes(q) && !(o.order_id||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  if (!filtered.length) { rToast('No orders to export'); return; }

  const dateLabel = { today:'Today', yesterday:'Yesterday', day_before:'2 Days Ago', all:'All Dates' }[_appliedDate];
  const slotLabel = { all:'All Sessions', morning:'Morning Orders', evening:'Evening Orders' }[_appliedSlot];
  const tabLabel  = _activeTab === 'pending' ? 'Pending' : 'Delivered';
  const totalAmt  = filtered.reduce((s,o) => s+(+o.final_amount||0), 0);

  const rows = filtered.map((o,i) => {
    const items = (o.items||[]).map(it=>`${it.name}${it.qty>1?` ×${it.qty}`:''}`).join(', ');
    const slot  = o.slot ? (o.slot==='morning'?'☀️ Morning':'🌙 Evening') : (_isSlotMatch(o,'morning')?'☀️ Morning':'🌙 Evening');
    const pay   = o.user_type==='subscriber' ? '💳 Wallet' : '💵 Cash';
    const status= (o.order_status||'pending').replace(/_/g,' ');
    return `<tr style="background:${i%2===0?'#fff':'#f9fafb'}">
      <td>${i+1}</td>
      <td style="font-family:monospace;font-size:11px">${o.order_id}</td>
      <td><b>${o.name||'—'}</b><br><span style="color:#64748b">${o.phone||''}</span></td>
      <td style="font-size:11px;color:#334155">${o.address||'—'}</td>
      <td style="font-size:12px">${items||'—'}</td>
      <td style="text-align:right;font-weight:700">₹${o.final_amount||0}</td>
      <td>${pay}</td>
      <td>${slot}</td>
      <td style="font-size:11px">${o.date||'—'}<br>${o.time||''}</td>
      <td style="font-size:11px;color:${o.order_status==='delivered'?'#166534':'#b45309'}">${status}</td>
    </tr>`;
  }).join('');

  const win = window.open('','_blank','width=1100,height=750');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Tiffo Rider — ${tabLabel} Orders</title>
  <style>
    body{font-family:'Segoe UI',sans-serif;padding:20px;color:#1e293b;background:#fff}
    h1{font-size:18px;font-weight:800;margin-bottom:3px}
    .meta{font-size:12px;color:#64748b;margin-bottom:14px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:#1e293b;color:white;padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
    td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top}
    .total-row{background:#f8fafc;font-weight:700;border-top:2px solid #e2e8f0}
    footer{margin-top:14px;font-size:11px;color:#94a3b8;text-align:right}
  </style></head><body>
  <h1>🛵 Tiffo Rider — ${tabLabel} Orders</h1>
  <div class="meta">Rider: ${_rider?.name||'—'} (${_rider?.rider_id||'—'}) &nbsp;|&nbsp; Filter: ${dateLabel} · ${slotLabel}${_appliedQuery?' · "'+_appliedQuery+'"':''} &nbsp;|&nbsp; Generated: ${new Date().toLocaleString('en-IN')}</div>
  <table>
    <thead><tr><th>#</th><th>Order ID</th><th>Customer</th><th>Address</th><th>Items</th><th>Amount</th><th>Payment</th><th>Session</th><th>Date/Time</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="total-row"><td colspan="5" style="text-align:right;padding:10px">Total (${filtered.length} orders):</td><td style="padding:10px;font-size:14px">₹${totalAmt}</td><td colspan="4"></td></tr></tfoot>
  </table>
  <footer>Tiffo Rider Panel © 2026</footer>

  win.document.close();
}

/* ─── ROUTE PLANNING ─────────────────────────────────── */
function openRouteModal(orders) {
  let list;
  if (typeof orders === 'string') {
    try { list = JSON.parse(orders); } catch { list = _pending; }
  } else {
    list = Array.isArray(orders) ? orders : _pending;
  }
  _routeAddresses = list.map(o => o.address).filter(Boolean);

  const listEl = document.getElementById('route-list');
  listEl.innerHTML = _routeAddresses.length
    ? _routeAddresses.map((addr, i) => `
        <div class="route-addr-item">
          <div class="route-num">${i + 1}</div>
          <div style="flex:1;font-size:14px">${addr}</div>
        </div>`).join('')
    : '<p style="color:#94a3b8;text-align:center;padding:20px">No addresses available</p>';

  document.getElementById('route-overlay').style.display = 'block';
  document.getElementById('route-modal').classList.add('open');
}

function closeRouteModal() {
  document.getElementById('route-modal').classList.remove('open');
  document.getElementById('route-overlay').style.display = 'none';
}

function openInMaps() {
  if (!_routeAddresses.length) return;
  const origin    = encodeURIComponent(_routeAddresses[0]);
  const waypoints = _routeAddresses.slice(1).map(a => encodeURIComponent(a)).join('|');
  const url = waypoints.length
    ? `https://www.google.com/maps/dir/?api=1&origin=${origin}&waypoints=${waypoints}&travelmode=driving`
    : `https://www.google.com/maps/search/?api=1&query=${origin}`;
  window.open(url, '_blank');
}

/* ─── HELPERS ────────────────────────────────────────── */
function openWA(phone, msg) {
  const a = document.createElement('a');
  a.href = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function openMaps(address) {
  if (!address) { rToast('No address available'); return; }
  window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address), '_blank');
}

function rToast(msg) {
  const t = document.getElementById('r-toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

function togglePw(id, btn) {
  const input = document.getElementById(id);
  input.type  = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

/* ─── POLLING ────────────────────────────────────────── */
// 300s background safety-net — rider does PTR for instant fresh data anytime
function startPolling() {
  clearInterval(_pollTimer);
  _pollTimer = setInterval(() => {
    if (document.hidden) return;
    loadOrders();
  }, 300_000);
}

function stopPolling() {
  clearInterval(_pollTimer);
  _pollTimer = null;
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopPolling();
  else { loadOrders(); startPolling(); }
});

/* ─── INIT ───────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  // Push initial state so first back press fires popstate
  history.pushState({ riderPg: 'init' }, '', location.href);
  autofillCreds();

  const cachedRider = RiderSession.get();
  if (cachedRider) {
    // FAST PATH — restore from cache instantly, zero network call
    // Same pattern as index.html: no "signing you in…" spinner
    _rider = cachedRider;
    showApp();
    loadOrders();
    startPolling();

    // BACKGROUND VERIFY — at most once every 48 hours.
    // Silently re-validates creds when server is quiet.
    // 30s delay so home screen + orders load first.
    const creds = getRiderCreds();
    if (creds && RiderSession.shouldVerify()) {
      setTimeout(() => {
        api('riderLogin', { riderId: creds.riderId, password: creds.pw }, 0)
          .then(res => {
            RiderSession.markVerified();
            _rider = res.rider;
            RiderSession.save(_rider);
            // Refresh display with latest rider data (name etc.)
            document.getElementById('rider-name').textContent       = _rider.name || 'Rider';
            document.getElementById('rider-id-display').textContent = _rider.rider_id || '';
          })
          .catch(e => {
            const isAuthError = e.message?.includes('Invalid') ||
                                e.message?.includes('Unauthorized') ||
                                e.message?.includes('not found');
            if (isAuthError) {
              // Password changed or account deactivated — silent logout
              doRiderLogout();
            }
            // Network/timeout error → keep cached session, try next time
          });
      }, 30000); // 30s delay — orders fully loaded before verify starts
    }
    return; // Fast path done
  }

  // SLOW PATH — no cache, has saved creds (e.g. storage was cleared)
  const creds = getRiderCreds();
  if (creds) {
    api('riderLogin', { riderId: creds.riderId, password: creds.pw }, 0)
      .then(res => {
        _rider = res.rider;
        RiderSession.save(_rider);
        showApp();
        loadOrders();
        startPolling();
      })
      .catch(() => { /* stay on login screen, creds already prefilled */ });
  }
});

// ─── ACCIDENTAL BACK PREVENTION (Rider) ──────────────────
// Uses tf_rider_creds token to detect logged-in state
function _riderShowExitConfirm() {
  if (document.getElementById('_rider-exit-overlay')) return;
  const overlay = document.createElement('div');
  overlay.id = '_rider-exit-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:flex-end;justify-content:center;animation:_fadeIn .15s ease';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px 20px 0 0;padding:24px 24px calc(24px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;font-family:var(--ff,sans-serif)">
      <p style="font-size:17px;font-weight:700;margin:0 0 6px;color:#0f172a">Exit Rider App?</p>
      <p style="font-size:14px;color:#64748b;margin:0 0 22px;line-height:1.5">You are still logged in. Are you sure you want to leave?</p>
      <div style="display:flex;gap:10px">
        <button id="_rider-stay-btn" style="flex:1;padding:13px;border-radius:12px;border:1.5px solid #e2e8f0;background:#fff;font-size:15px;font-weight:600;cursor:pointer;color:#334155">Stay</button>
        <button id="_rider-leave-btn" style="flex:1;padding:13px;border-radius:12px;border:none;background:#0f172a;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Exit App</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('_rider-stay-btn').onclick = () => {
    overlay.remove();
    history.pushState({ riderPg: 'stay' }, '', location.href);
  };
  document.getElementById('_rider-leave-btn').onclick = () => { overlay.remove(); history.go(-2); };
}

window.addEventListener('popstate', () => {
  const creds = getRiderCreds();
  const appVisible = document.getElementById('pg-app')?.style.display !== 'none';
  const authVisible = document.getElementById('pg-auth')?.style.display !== 'none';
  if (creds && appVisible) {
    // Logged in and inside app — block exit and confirm
    history.pushState({ riderPg: 'guard' }, '', location.href);
    _riderShowExitConfirm();
  } else if (authVisible) {
    // On login screen — block exit and confirm (may have typed password)
    history.pushState({ riderPg: 'auth-guard' }, '', location.href);
    _riderShowExitConfirm();
  }
});

/* ═══════════════════════════════════════
   PULL-TO-REFRESH — Rider App
   Listens on document (body-scroll page).
   Only fires when pg-app is visible.
   Always fetches fresh from DB — no cache.
═══════════════════════════════════════ */
(function initRiderPTR() {
  const THRESHOLD = 65;
  let startY = 0, pulling = false;

  document.addEventListener('touchstart', e => {
    // Only PTR when app panel visible and already scrolled to top
    const appVisible = document.getElementById('pg-app')?.style.display !== 'none';
    if (appVisible && window.scrollY === 0) {
      startY  = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy    = e.touches[0].clientY - startY;
    if (dy < 0) { pulling = false; return; }
    const zone  = document.getElementById('ptr-zone-rider');
    const arrow = document.getElementById('ptr-arrow-rider');
    if (dy > 8)  zone.style.height  = Math.min(dy * 0.45, 52) + 'px';
    if (arrow)   arrow.style.transform = dy > THRESHOLD ? 'rotate(180deg)' : 'rotate(0deg)';
  }, { passive: true });

  document.addEventListener('touchend', async e => {
    if (!pulling) return;
    pulling = false;
    const dy    = e.changedTouches[0].clientY - startY;
    const zone  = document.getElementById('ptr-zone-rider');
    const arrow = document.getElementById('ptr-arrow-rider');

    if (dy > THRESHOLD) {
      if (arrow) { arrow.style.display = 'none'; }
      zone.style.height = '60px';
      RPB.ptrStart();   // PTR zone progress bar
      RPB.gpShow();     // global top bar

      try {
        await loadOrders();
        RPB.gpDone();
        RPB.ptrDone();
        startPolling();  // reset poll timer after PTR
      } catch (_) {
        RPB.gpError();
        RPB.ptrDone();
      }
      if (arrow) { arrow.style.display = 'inline-block'; }
    }
    zone.style.height = '0';
    if (arrow) arrow.style.transform = 'rotate(0deg)';
  }, { passive: true });
})();
</script>
