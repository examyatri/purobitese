<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Puro Bite – Rider</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@import "tailwindcss";

:root{
  --p:#e63946;--pd:#c1121f;--pl:#fde8ea;
  --g:#2a9d8f;--gl:#e0f5f2;
  --tx:#1a1f2e;--mu:#6b7280;--lt:#e5e7eb;
  --ff:'Sora',sans-serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:#f4f6f9;color:var(--tx);max-width:520px;margin:0 auto;}
.hide{display:none!important}

/* ── TAB BAR ── */
.tab-bar{display:flex;background:#fff;margin:10px;border-radius:12px;padding:4px;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.tab-btn{flex:1;padding:10px;text-align:center;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;border:none;background:none;color:var(--mu);transition:all .18s;}
.tab-btn.act{background:var(--p);color:#fff;box-shadow:0 2px 6px rgba(230,57,70,.3);}

/* ── ORDER CARD ── */
.o-card{background:#fff;border-radius:14px;margin:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #eee;}
.oc-id{font-size:11px;font-weight:700;color:var(--mu);margin-bottom:8px;display:block;}
.oc-name{font-family:var(--ff);font-size:16px;font-weight:800;margin-bottom:4px;}
.oc-addr{font-size:13px;color:var(--mu);margin-bottom:12px;line-height:1.4;}
.oc-items{font-size:12px;background:#f8f9fa;padding:12px;border-radius:10px;margin-bottom:12px;}
.item-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.item-row:last-child{margin-bottom:0;}
.thali-badge{background:var(--pl);color:var(--p);font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;text-transform:uppercase;margin-left:6px;}

.btn-deliver{background:var(--g);color:#fff;border:none;border-radius:10px;padding:14px;width:100%;font-weight:800;font-family:var(--ff);cursor:pointer;box-shadow:0 4px 12px rgba(42,157,143,.3);}
.btn-deliver:active{transform:scale(.97)}

.inp{width:100%;padding:14px;background:#fff;border:2px solid #eee;border-radius:10px;outline:none;}
.inp:focus{border-color:var(--p);}
</style>
</head>
<body>

<div id="pg-auth">
  <div style="padding:60px 20px; text-align:center;">
    <div style="font-size:64px; margin-bottom:10px;">🏍️</div>
    <h1 style="font-family:var(--ff); font-size:28px; font-weight:900; color:var(--p);">Puro Bite Rider</h1>
    <p style="color:var(--mu); margin-bottom:40px;">Delivery Partner Portal</p>
    
    <div style="text-align:left;">
      <input id="r-em" class="inp" placeholder="Rider Email" style="margin-bottom:12px;">
      <input id="r-pw" class="inp" type="password" placeholder="Password" style="margin-bottom:24px;">
      <button class="btn-deliver" style="background:var(--p);" onclick="doLogin()">Login & Start Delivery</button>
    </div>
  </div>
</div>

<div id="pg-app" class="hide">
  <div style="padding:16px;background:#fff;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;">
    <div>
      <h3 id="r-name" style="font-family:var(--ff); font-size:15px; font-weight:800;">Rider</h3>
      <div style="font-size:11px; color:var(--g); font-weight:700;"><i class="fa-solid fa-circle" style="font-size:8px;"></i> Online</div>
    </div>
    <button onclick="doLogout()" style="background:none;border:none;color:var(--p);font-weight:700;font-size:13px;">Logout</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn act" onclick="switchTab('new')">New Orders</button>
    <button class="tab-btn" onclick="switchTab('active')">Active</button>
    <button class="tab-btn" onclick="switchTab('done')">Completed</button>
  </div>

  <div id="orders-con" style="padding-bottom:40px;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CFG = { 'GAS': 'https://purobitese-api.onrender.com/api', 'KEY': 'PB_SECURE_API_KEY_2026' };
let _rider = null;
let _orders = [];
let _currentTab = 'new';

async function api(action, data = {}) {
  const r = await fetch(CFG.GAS, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, data, apiKey: CFG.KEY })
  });
  const res = await r.json();
  if (!res.success) throw new Error(res.error);
  return res.data;
}

function doc(id) { return document.getElementById(id); }
function toast(msg) {
  const t = doc('toast'); if(!t) return;
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 3000);
}

async function doLogin() {
  const email = doc('r-em').value, password = doc('r-pw').value;
  if(!email || !password) return alert('Fill all fields');
  try {
    _rider = await api('riderLogin', { email, password });
    localStorage.setItem('pb_rider_session', JSON.stringify(_rider));
    doc('pg-auth').classList.add('hide');
    doc('pg-app').classList.remove('hide');
    doc('r-name').textContent = 'Hi, ' + _rider.name;
    loadOrders();
  } catch(e) { alert(e.message); }
}

function doLogout() {
  _rider = null;
  localStorage.removeItem('pb_rider_session');
  location.reload();
}

async function loadOrders() {
  try {
    _orders = await api('getRiderOrders', { riderId: _rider.riderId });
    renderOrders();
  } catch(e) { toast(e.message); }
}

function switchTab(tab) {
  _currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('act', (i === 0 && tab === 'new') || (i === 1 && tab === 'active') || (i === 2 && tab === 'done'));
  });
  renderOrders();
}

function renderOrders() {
  const con = doc('orders-con');
  let filtered = [];
  if (_currentTab === 'new') filtered = _orders.filter(o => o.orderStatus === 'verified' || o.orderStatus === 'preparing');
  if (_currentTab === 'active') filtered = _orders.filter(o => o.orderStatus === 'out for delivery');
  if (_currentTab === 'done') filtered = _orders.filter(o => o.orderStatus === 'delivered');

  if(!filtered.length) {
    con.innerHTML = `<div style="text-align:center; padding:60px; color:var(--mu);">No orders in this tab</div>`;
    return;
  }

  con.innerHTML = filtered.map(o => {
    let items = []; try { items = JSON.parse(o.items); } catch { items = []; }
    const itemsHtml = items.map(i => `
      <div class="item-row">
        <div>
          <span style="font-weight:700;">${i.name}</span>
          ${i.isThali ? '<span class="thali-badge">Thali</span>' : ''}
          <div style="font-size:10px; color:var(--mu);">${i.selectedVariant || ''}</div>
        </div>
        <div style="font-weight:800;">x${i.qty}</div>
      </div>`).join('');
    
    return `
      <div class="o-card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <span class="oc-id">${o.orderId} · ${o.date}</span>
          <span style="font-size:10px; font-weight:800; color:var(--p); text-transform:uppercase;">${o.orderStatus}</span>
        </div>
        <div class="oc-name">${o.name}</div>
        <div class="oc-addr"><i class="fa-solid fa-location-dot" style="color:var(--p);"></i> ${o.address}</div>
        <div class="oc-items">${itemsHtml}</div>
        
        <div style="display:flex; gap:8px;">
          <a href="tel:${o.phone}" style="flex:1; background:#e8f5f3; color:var(--g); text-decoration:none; text-align:center; padding:12px; border-radius:10px; font-weight:800; font-size:13px;"><i class="fa-solid fa-phone"></i> Call</a>
          <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.address)}" target="_blank" style="flex:1; background:#eef2ff; color:#4f46e5; text-decoration:none; text-align:center; padding:12px; border-radius:10px; font-weight:800; font-size:13px;"><i class="fa-solid fa-map-location-dot"></i> Maps</a>
        </div>

        ${o.orderStatus === 'out for delivery' ? `
          <button class="btn-deliver" style="margin-top:12px;" onclick="markDelivered('${o.orderId}')">
            <i class="fa-solid fa-circle-check"></i> Mark Delivered
          </button>` : ''}
          
        ${(o.orderStatus === 'verified' || o.orderStatus === 'preparing') ? `
          <button class="btn-deliver" style="margin-top:12px; background:var(--p);" onclick="markOutForDelivery('${o.orderId}')">
            <i class="fa-solid fa-truck"></i> Pick Up & Start
          </button>` : ''}
      </div>`;
  }).join('');
}

async function markOutForDelivery(orderId) {
  try {
    await api('updateOrderStatus', { orderId, status: 'out for delivery', riderId: _rider.riderId });
    toast('Order picked up!');
    loadOrders();
  } catch(e) { toast(e.message); }
}

async function markDelivered(orderId) {
  try {
    await api('updateOrderStatus', { orderId, status: 'delivered' });
    toast('Order delivered!');
    loadOrders();
  } catch(e) { toast(e.message); }
}

window.onload = () => {
  const saved = localStorage.getItem('pb_rider_session');
  if(saved) {
    _rider = JSON.parse(saved);
    doc('pg-auth').classList.add('hide');
    doc('pg-app').classList.remove('hide');
    doc('r-name').textContent = 'Hi, ' + _rider.name;
    loadOrders();
  }
};
</script>
</body>
</html>
